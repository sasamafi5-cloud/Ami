<!DOCTYPE html>
<html lang="sr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroceryAI • 2035</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(28px); border: 1px solid rgba(148, 163, 184, 0.4); }
    .neon { box-shadow: 0 0 35px #22d3ee, 0 0 60px #c026d3; }
    .avatar-float { animation: float 3.8s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .emoji { font-size: 52px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-24">

  <div class="max-w-xl mx-auto px-4 pt-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">GroceryAI</h1>
      <button onclick="updatePrices()" class="bg-emerald-600 px-5 py-2 rounded-2xl text-sm font-semibold neon">🔄 Ažuriraj cene</button>
    </div>

    <!-- HOME -->
    <div id="tab-home" class="tab-content active">
      <div class="flex gap-6 items-center mb-10">
        <div class="flex-1">
          <h2 class="text-3xl font-semibold">Zdravo, Marko! 👋</h2>
          <p class="text-cyan-400">Tvoj AI asistent iz 2035.</p>
        </div>
        <img id="avatarImg" src="https://picsum.photos/id/1015/600/600" 
             class="w-40 h-40 rounded-3xl object-cover avatar-float neon border-4 border-cyan-400/60" alt="AI">
      </div>

      <button onclick="startVoiceRecognition()" class="w-full glass rounded-3xl py-8 text-2xl font-semibold neon flex items-center justify-center gap-4">
        🎤 Pričaj sa AI
      </button>
    </div>

    <!-- PRETRAGA -->
    <div id="tab-search" class="tab-content">
      <div class="glass rounded-3xl p-2 mb-6">
        <input id="searchInput" type="text" placeholder="Pretraži namirnice..." 
               class="w-full bg-transparent px-5 py-4 focus:outline-none text-lg" onkeyup="searchProducts()">
      </div>
      <div class="grid grid-cols-2 gap-3" id="productsGrid"></div>
    </div>

    <!-- KORPA -->
    <div id="tab-cart" class="tab-content">
      <h3 class="text-xl font-semibold mb-4">Tvoja korpa <span id="cart-count" class="text-cyan-400">(0)</span></h3>
      <div id="cart" class="glass rounded-3xl p-5 space-y-4 min-h-[300px]"></div>
      <div class="mt-8 flex justify-between items-center">
        <div>
          <p class="text-gray-400">Ukupno</p>
          <p id="total" class="text-4xl font-bold text-cyan-400">0 RSD</p>
        </div>
        <button onclick="checkout()" class="bg-gradient-to-r from-cyan-500 to-purple-600 px-12 py-6 rounded-3xl font-bold">Završi kupovinu</button>
      </div>
    </div>

    <!-- RECEPTI -->
    <div id="tab-recipes" class="tab-content">
      <h3 class="text-xl font-semibold mb-4">🍳 Predloženi recepti</h3>
      <div id="recipesList" class="space-y-4"></div>
    </div>

    <!-- PROFIL -->
    <div id="tab-profile" class="tab-content">
      <div class="glass rounded-3xl p-8 text-center">
        <h2 class="text-2xl font-semibold mb-6">👤 Profil</h2>
        <p class="text-2xl">Marko Petrović</p>
        <p class="text-cyan-400">Kovin, Vojvodina</p>
        <div class="mt-8 space-y-4 text-left">
          <p>💰 Potrošeno ovog meseca: <span class="text-cyan-400">15.320 RSD</span></p>
          <p>⭐ Najčešće: Banane, Jaja, Mleko</p>
        </div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 py-3">
    <div class="max-w-xl mx-auto flex justify-around text-3xl">
      <button onclick="switchTab(0)" class="nav-btn active">🏠</button>
      <button onclick="switchTab(1)" class="nav-btn">🔍</button>
      <button onclick="startVoiceRecognition()" class="nav-btn">🎤</button>
      <button onclick="switchTab(2)" class="nav-btn">🛒</button>
      <button onclick="switchTab(3)" class="nav-btn">👤</button>
    </div>
  </nav>

  <script>
    let products = [
      { name: "Jaja 10kom", price: 179, store: "Lidl", emoji: "🥚", keywords: ["jaja","jaje"] },
      { name: "Mleko 1L", price: 98, store: "Idea", emoji: "🥛", keywords: ["mleko"] },
      { name: "Pomorandže 1kg", price: 149, store: "Maxi", emoji: "🍊", keywords: ["pomorandza","pomorandže"] },
      { name: "Banane 1kg", price: 95, store: "Lidl", emoji: "🍌", keywords: ["banane","banana"] },
      { name: "Jabuke 1kg", price: 89, store: "Univerexport", emoji: "🍎", keywords: ["jabuke","jabuka"] },
      { name: "Piletina 1kg", price: 489, store: "Maxi", emoji: "🍗", keywords: ["piletina","pile"] },
      { name: "Paradajz 1kg", price: 129, store: "Lidl", emoji: "🍅", keywords: ["paradajz"] },
      { name: "Hleb 500g", price: 65, store: "Idea", emoji: "🍞", keywords: ["hleb"] },
      { name: "Sir beli 400g", price: 245, store: "Maxi", emoji: "🧀", keywords: ["sir"] },
      { name: "Kafa 100g", price: 189, store: "Lidl", emoji: "☕", keywords: ["kafa"] },
      { name: "Krompir 2kg", price: 120, store: "Idea", emoji: "🥔", keywords: ["krompir"] },
      { name: "Krastavac 1kg", price: 85, store: "Lidl", emoji: "🥒", keywords: ["krastavac"] }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let total = cart.reduce((sum, item) => sum + (item.price || 0), 0);

    function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1e2937;color:white;padding:16px 24px;border-radius:9999px;border:1px solid #22d3ee;z-index:1000;';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(['tab-home','tab-search','tab-cart','tab-recipes','tab-profile'][tab]).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach((btn, i) => btn.classList.toggle('active', i === tab));
    }

    function renderProducts(filtered = products) {
      const container = document.getElementById('productsGrid');
      container.innerHTML = '';
      filtered.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'glass rounded-3xl p-4 text-center cursor-pointer';
        div.innerHTML = `
          <div class="emoji mx-auto">${p.emoji}</div>
          <p class="mt-2 font-medium">${p.name}</p>
          <p class="text-cyan-400 font-bold">${p.price} RSD</p>
          <button onclick="addToCart(${products.indexOf(p)})" class="mt-4 w-full py-2 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-2xl text-sm">Dodaj</button>
        `;
        container.appendChild(div);
      });
    }

    function searchProducts() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(term) || p.keywords.some(k => k.includes(term)));
      renderProducts(filtered.length ? filtered : products);
    }

    function addToCart(i) {
      cart.push(products[i]);
      total += products[i].price;
      saveCart();
      renderCart();
      showToast(`✅ Dodato: ${products[i].name}`);
    }

    function renderCart() {
      const el = document.getElementById('cart');
      el.innerHTML = cart.length === 0 ? '<p class="text-center text-gray-500 py-12">Korpa je prazna...</p>' : '';
      cart.forEach((item, i) => {
        el.innerHTML += `
          <div class="flex items-center gap-4 bg-zinc-900/60 rounded-2xl p-3">
            <span class="text-4xl">${item.emoji}</span>
            <div class="flex-1"><p>${item.name}</p></div>
            <p class="font-bold">${item.price} RSD</p>
            <button onclick="removeFromCart(${i})" class="text-red-400 text-2xl">✕</button>
          </div>
        `;
      });
      document.getElementById('total').textContent = total + " RSD";
      document.getElementById('cart-count').textContent = `(${cart.length})`;
    }

    function removeFromCart(i) {
      total -= cart[i].price;
      cart.splice(i, 1);
      saveCart();
      renderCart();
    }

    function startVoiceRecognition() {
      if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
        showToast("❌ Mikrofon nije podržan");
        return;
      }

      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'sr-RS';
      recognition.onstart = () => showToast("🎤 Slušam te...");

      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript.toLowerCase();
        showToast(`👂 "${text}"`);

        let quantity = 1;
        const numMatch = text.match(/(\d+)/);
        if (numMatch) quantity = parseInt(numMatch[0]);

        let added = false;
        products.forEach(p => {
          if (text.includes(p.name.toLowerCase()) || p.keywords.some(k => text.includes(k))) {
            for (let i = 0; i < quantity; i++) {
              cart.push(p);
              total += p.price;
            }
            added = true;
            showToast(`✅ Dodato ${quantity} × ${p.name}`);
          }
        });

        if (!added) showToast("🤖 AI: Probaj: 'dodaj 2 litra mleka' ili 'dodaj 5 jaja'");

        renderCart();
        saveCart();

        const utterance = new SpeechSynthesisUtterance(added ? `Dodato ${quantity} komada.` : "Nisam razumeo, probaj ponovo.");
        utterance.lang = 'sr-RS';
        utterance.pitch = 1.15;
        speechSynthesis.speak(utterance);
      };

      recognition.start();
    }

    function updatePrices() { showToast("✅ Cene su ažurirane"); }
    function checkout() {
      if (cart.length === 0) return showToast("Korpa je prazna!");
      showToast(`✅ Kupovina završena! Ukupno: ${total} RSD`);
      cart = []; total = 0; saveCart(); renderCart();
    }

    window.onload = () => {
      renderProducts(products);
      renderCart();
    };
  </script>
</body>
</html>
