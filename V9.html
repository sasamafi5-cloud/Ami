<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ami • AI Sekretarica</title>
  <meta name="theme-color" content="#f8f9fa">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #1c1c1e;
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }
    .header {
      padding: 12px 16px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tabs {
      display: flex;
      background: #f1f1f3;
      margin: 8px 12px;
      border-radius: 50px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .tab.active { background: white; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }

    .main {
      display: flex;
      height: calc(100vh - 145px);
      overflow: hidden;
    }
    .sidebar {
      width: 48%;
      background: white;
      overflow-y: auto;
      padding: 8px;
      border-right: 1px solid #eee;
    }
    .item {
      padding: 14px 16px;
      margin: 6px 4px;
      border-radius: 16px;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
    }
    .badge {
      margin-left: auto;
      background: #ff2d55;
      color: white;
      font-size: 0.85rem;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .right-side {
      flex: 1;
      padding: 20px 16px;
      position: relative;
      background: #f8f9fa;
    }
    .mic {
      position: absolute;
      bottom: 30px;
      right: 20px;
      width: 115px;
      height: 115px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 58px;
      box-shadow: 0 10px 30px rgba(0,120,255,0.25),
                  inset 0 0 20px rgba(255,255,255,0.9);
      border: 8px solid #e0f0ff;
      cursor: pointer;
    }
    .status {
      position: absolute;
      bottom: 160px;
      left: 20px;
      right: 20px;
      text-align: center;
      font-size: 1.05rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <strong>Ami</strong>
    <div><span style="color:#34c759;">●</span> Online</div>
    <div id="time">10:45</div>
  </div>

  <div class="tabs">
    <div class="tab active">Quick Notes</div>
    <div class="tab">Alarmi</div>
  </div>

  <div class="main">
    <!-- Leva strana -->
    <div class="sidebar">
      <div class="item" onclick="selectItem(0)">📝 Ideas <span class="badge">3</span></div>
      <div class="item" onclick="selectItem(1)">✅ To-Do <span class="badge">5</span></div>
      <div class="item" onclick="selectItem(2)">📋 Meeting Notes <span class="badge">8</span></div>
      <div class="item" onclick="selectItem(3)">📄 Random Drafts <span class="badge">@2</span></div>

      <div style="margin:20px 10px 8px; font-weight:600; color:#444;">Današnji alarmi</div>
      <div class="item" onclick="showAlarm(0)">⏰ Morning Workout 8:00</div>
      <div class="item" onclick="showAlarm(1)">📞 Client Call 14:30</div>
    </div>

    <!-- Desna strana -->
    <div class="right-side">
      <div style="text-align:center; margin-top:30px;">
        <div style="background:white; display:inline-flex; align-items:center; padding:8px 20px; border-radius:50px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
          👤 <strong>Ami</strong>
        </div>
      </div>
      
      <div class="mic" id="micBtn">🎤</div>
      <div class="status">Pritisni da govoriš i snimiš belešku</div>
    </div>
  </div>

  <script>
    // Vreme
    setInterval(() => {
      const d = new Date();
      document.getElementById('time').textContent = d.getHours() + ":" + d.getMinutes().toString().padStart(2,'0');
    }, 20000);

    function selectItem(n) {
      const names = ["Ideas", "To-Do", "Meeting Notes", "Random Drafts"];
      document.querySelector('.status').textContent = names[n] + " otvoreno";
    }

    function showAlarm(n) {
      const alarms = ["Morning Workout u 8:00", "Client Call u 14:30"];
      document.querySelector('.status').textContent = alarms[n];
    }

    // Glasovno
    document.getElementById('micBtn').addEventListener('click', () => {
      if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'sr-RS';
        rec.start();
        document.querySelector('.status').textContent = "Slušam te...";
        
        rec.onresult = (e) => {
          const text = e.results[0][0].transcript;
          document.querySelector('.status').textContent = "Ti: " + text;
        };
      } else {
        alert("Slušam te... (demo mod)");
      }
    });

    // Pozdrav
    window.onload = () => {
      setTimeout(() => {
        document.querySelector('.status').textContent = "Zdravo! Ja sam Ami 👋";
      }, 600);
    };
  </script>
</body>
</html>
