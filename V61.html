<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna Asistent</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0d0d0d;
      color: #f2f2f2;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: #111;
    }
    .logo {
      color: #4fc3f7;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .button {
      background: #4fc3f7;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 25px;
      border: none;
      font-weight: 600;
    }
    .card {
      background: #151515;
      margin: 1.2rem;
      padding: 1.2rem;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(79,195,247,0.1);
    }
    h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
    }
    textarea, input {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.8rem;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      background: #f2f2f2;
      color: #111;
    }
    button {
      margin-top: 0.6rem;
      margin-right: 0.4rem;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      border: none;
      background: #e0e0e0;
      color: #111;
      font-weight: 600;
      cursor: pointer;
    }
    .microphone {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
    }
    .mic-ring {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, #4fc3f7, #7e57c2);
      animation: pulse 3s infinite;
      cursor: pointer;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    ul { list-style-type: none; padding-left: 1rem; }
    li::before { content: "• "; color: #4fc3f7; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Luna</div>
    <button class="button">Saša</button>
  </header>

  <main>
    <div class="card">
      <h2>Beleške 🔔</h2>
      <textarea id="noteInput" placeholder="Unesi belešku..."></textarea>
      <button onclick="addNote()">Dodaj belešku</button>
      <button onclick="startVoiceInput()">🎤 Unesi glasom</button>
      <ul id="notesList"></ul>
    </div>

    <div class="card">
      <h2>Aktivni Alarmi ⏰</h2>
      <input type="time" id="alarmTime">
      <button onclick="setAlarm()">Dodaj alarm</button>
      <ul id="alarmsList"></ul>
    </div>

    <div class="microphone">
      <div class="mic-ring" onclick="speakNotes()"></div>
    </div>
  </main>

  <script>
    function addNote(noteText) {
      const noteInput = document.getElementById("noteInput");
      const notesList = document.getElementById("notesList");
      const text = noteText || noteInput.value;
      if (text.trim() !== "") {
        const li = document.createElement("li");
        li.textContent = text;
        notesList.appendChild(li);
        noteInput.value = "";
        speak("Dodala sam belešku: " + text);
      }
    }

    function setAlarm(timeText) {
      const alarmTime = timeText || document.getElementById("alarmTime").value;
      const alarmsList = document.getElementById("alarmsList");
      if (alarmTime) {
        const li = document.createElement("li");
        li.textContent = "Alarm u " + alarmTime;
        alarmsList.appendChild(li);
        speak("Postavila sam alarm u " + alarmTime);
      }
    }

    function speak(text) {
      const synth = window.speechSynthesis;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "sr-RS";
      synth.speak(utter);
    }

    function speakNotes() {
      let text = "";
      document.querySelectorAll("#notesList li").forEach(li => text += li.textContent + ". ");
      speak(text || "Nema beleški.");
    }

    function startVoiceInput() {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = "sr-RS";
      recognition.start();
      recognition.onresult = (event) => {
        const spokenText = event.results[0][0].transcript.toLowerCase();
        if (spokenText.includes("beleška")) {
          addNote(spokenText.replace("beleška", "").trim());
        } else if (spokenText.includes("alarm")) {
          const timeMatch = spokenText.match(/\d{1,2}[:.]?\d{0,2}/);
          if (timeMatch) setAlarm(timeMatch[0]);
        } else {
          speak("Nisam sigurna, ponovi molim te.");
        }
      };
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("Service Worker registrovan"));
    }
  </script>
</body>
</html>
