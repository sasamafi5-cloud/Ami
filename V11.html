<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Sii AI Sekretarica</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top,#d8f6ff 0%,#edf1ff 45%,#f8fbff 100%);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:8px;
}

body::before{
content:'';
position:fixed;
width:300px;
height:300px;
background:linear-gradient(45deg,#71e5ff,#9d7dff);
filter:blur(100px);
opacity:0.3;
top:-100px;
left:-100px;
z-index:-1;
}

.phone{
width:100%;
max-width:390px;
height:100vh;
overflow:hidden;
padding:12px;
border-radius:30px;

background:rgba(255,255,255,0.28);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.7);

box-shadow:
0 25px 50px rgba(0,0,0,0.08),
inset 0 2px 2px rgba(255,255,255,0.8);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:52px;
height:52px;
border-radius:50%;
background:url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&auto=format&fit=crop') center/cover;
border:3px solid white;

box-shadow:
0 0 15px rgba(90,200,255,0.4);
}

.profile-text h2{
font-size:22px;
font-weight:700;
}

.profile-text span{
font-size:12px;
color:#666;
}

.time{
text-align:right;
}

.time h1{
font-size:48px;
line-height:1;
font-weight:700;

background:linear-gradient(45deg,#43d8ff,#7770ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.time span{
font-size:11px;
color:#666;
}

.weather{
margin-top:10px;
padding:14px;
border-radius:24px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(15px);

box-shadow:
0 10px 25px rgba(0,0,0,0.05),
inset 0 1px 1px rgba(255,255,255,0.8);
}

.weather h3{
font-size:34px;
}

.weather p{
font-size:13px;
color:#555;
}

.mic-area{
margin-top:12px;
text-align:center;
position:relative;
}

.wave{
position:absolute;
left:50%;
top:40%;
transform:translate(-50%,-50%);
width:220px;
height:220px;
border-radius:50%;

background:
radial-gradient(circle,#76ecff33 0%,transparent 70%);

filter:blur(20px);

animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(0.9);}
50%{transform:translate(-50%,-50%) scale(1.06);}
100%{transform:translate(-50%,-50%) scale(0.9);}
}

.mic{
width:120px;
height:120px;
margin:auto;
border-radius:50%;
overflow:hidden;
cursor:pointer;
position:relative;
z-index:2;

background:
linear-gradient(145deg,#ffffff,#dce6ff);

display:flex;
justify-content:center;
align-items:center;

box-shadow:
0 15px 35px rgba(0,0,0,0.1),
0 0 30px rgba(90,220,255,0.4);

transition:0.3s;
}

.mic:hover{
transform:scale(1.04);
}

.mic.active{
animation:micGlow 1.2s infinite;
}

@keyframes micGlow{
0%{box-shadow:0 0 15px rgba(90,220,255,0.4);}
50%{box-shadow:0 0 45px rgba(90,220,255,1);}
100%{box-shadow:0 0 15px rgba(90,220,255,0.4);}
}

.mic img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

.title{
margin-top:10px;
font-size:42px;
font-weight:700;

background:
linear-gradient(45deg,#43d8ff,#7770ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.status{
font-size:13px;
color:#666;
margin-top:4px;
}

.btn{
border:none;
padding:10px 16px;
border-radius:18px;
cursor:pointer;
font-size:13px;
font-weight:600;

background:
linear-gradient(45deg,#5ce9ff,#7c73ff);

color:white;

margin-top:10px;

box-shadow:
0 10px 25px rgba(100,120,255,0.3);
}

.controls{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
margin-top:8px;
}

.cards{
margin-top:14px;

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
padding:12px;
border-radius:24px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(12px);

min-height:100px;

box-shadow:
0 10px 20px rgba(0,0,0,0.05),
inset 0 1px 1px rgba(255,255,255,0.8);
}

.card h4{
font-size:14px;
margin-bottom:8px;
}

.card p,
.card li{
font-size:12px;
line-height:1.5;
color:#555;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:14px;
margin-top:6px;
outline:none;
background:rgba(255,255,255,0.6);
font-size:12px;
}

.notes-list div{
padding:6px;
margin-top:6px;
border-radius:10px;
background:rgba(255,255,255,0.5);
font-size:11px;
}

.audio-list audio{
width:100%;
margin-top:8px;
height:30px;
}

.bottom-nav{
position:absolute;
bottom:10px;
left:12px;
right:12px;

padding:10px;

display:flex;
justify-content:space-around;
align-items:center;

border-radius:30px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(18px);

box-shadow:
0 10px 30px rgba(0,0,0,0.08);
}

.nav-btn{
width:48px;
height:48px;
border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:22px;

background:
linear-gradient(145deg,#ffffff,#dfe8ff);

box-shadow:
0 5px 15px rgba(0,0,0,0.08);
}

.center-btn{
width:60px;
height:60px;
font-size:28px;

background:
linear-gradient(45deg,#5ce9ff,#7c73ff);

color:white;

box-shadow:
0 0 25px rgba(90,220,255,0.7);
}

</style>
</head>

<body>

<div class="phone">

<div class="header">

<div class="profile">

<div class="avatar"></div>

<div class="profile-text">
<h2>Sii</h2>
<span>AI Sekretarica ● Online</span>
</div>

</div>

<div class="time">
<h1 id="clock">00:00</h1>
<span id="date">Datum</span>
</div>

</div>

<div class="weather">
<h3>22°</h3>
<p>Delimično oblačno • AI pregled dana spreman</p>
</div>

<div class="mic-area">

<div class="wave"></div>

<div class="mic" id="micBtn">

<img id="micImage" src="https://cdn-icons-png.flaticon.com/512/149/149852.png">

</div>

<div class="title">
Sii Sluša
</div>

<div class="status" id="status">
Dodirni mikrofon za razgovor
</div>

<input type="file" id="uploadMic" accept="image/*" style="display:none">

<div class="controls">

<button class="btn" onclick="document.getElementById('uploadMic').click()">
🎨 Mikrofon
</button>

<button class="btn" id="speakBtn">
🔊 Glas
</button>

<button class="btn" id="recordBtn">
🎙 Snimi
</button>

</div>

</div>

<div class="cards">

<div class="card">
<h4>📅 Obaveze</h4>

<ul>
<li>08:30 Briefing</li>
<li>11:00 Projekat</li>
<li>15:30 Sastanak</li>
</ul>

</div>

<div class="card">

<h4>📝 Beleške</h4>

<input type="text" id="noteInput" placeholder="Dodaj belešku">

<button class="btn" style="width:100%;" id="saveNote">
Sačuvaj
</button>

<div class="notes-list" id="notesList"></div>

</div>

<div class="card">

<h4>🎙 Audio</h4>

<div class="audio-list" id="audioList"></div>

</div>

<div class="card">

<h4>💙 Motivacija</h4>

<p id="quote">
Disciplina danas, sloboda sutra.
</p>

</div>

</div>

<div class="bottom-nav">

<div class="nav-btn">🏠</div>

<div class="nav-btn">📋</div>

<div class="nav-btn center-btn">✨</div>

<div class="nav-btn">📊</div>

<div class="nav-btn">⚙️</div>

</div>

</div>

<script>

function updateClock(){

const now = new Date();

document.getElementById('clock').innerText =
now.toLocaleTimeString('sr-RS',{
hour:'2-digit',
minute:'2-digit'
});

document.getElementById('date').innerText =
now.toLocaleDateString('sr-RS',{
weekday:'short',
day:'numeric',
month:'short'
});

}

setInterval(updateClock,1000);

updateClock();

const micBtn = document.getElementById('micBtn');

const statusText = document.getElementById('status');

let recognition;

if('webkitSpeechRecognition' in window){

recognition = new webkitSpeechRecognition();

recognition.lang = 'sr-RS';

recognition.onstart = ()=>{

statusText.innerText = 'Sii sluša...';

micBtn.classList.add('active');

};

recognition.onend = ()=>{

micBtn.classList.remove('active');

};

recognition.onresult = (event)=>{

const text = event.results[0][0].transcript;

statusText.innerText = 'Rekao si: ' + text;

const speech = new SpeechSynthesisUtterance(
'Razumela sam. Rekao si: ' + text
);

speech.lang = 'sr-RS';

speechSynthesis.speak(speech);

};

micBtn.addEventListener('click',()=>{

recognition.start();

});

}else{

statusText.innerText =
'Voice recognition nije podržan';

}

document.getElementById('speakBtn')
.addEventListener('click',()=>{

const speech = new SpeechSynthesisUtterance(
'Zdravo. Ja sam Sii, tvoja AI sekretarica.'
);

speech.lang='sr-RS';

speechSynthesis.speak(speech);

});

const noteInput =
document.getElementById('noteInput');

const saveNote =
document.getElementById('saveNote');

const notesList =
document.getElementById('notesList');

function loadNotes(){

notesList.innerHTML='';

const notes =
JSON.parse(localStorage.getItem('sii_notes')) || [];

notes.forEach((note,index)=>{

const div = document.createElement('div');

div.innerHTML =
`${note}
<button onclick="deleteNote(${index})"
style="
float:right;
border:none;
background:none;
cursor:pointer;
">
❌
</button>`;

notesList.appendChild(div);

});

}

saveNote.addEventListener('click',()=>{

if(noteInput.value.trim() !== ''){

const notes =
JSON.parse(localStorage.getItem('sii_notes')) || [];

notes.push(noteInput.value);

localStorage.setItem(
'sii_notes',
JSON.stringify(notes)
);

noteInput.value='';

loadNotes();

}

});

function deleteNote(index){

const notes =
JSON.parse(localStorage.getItem('sii_notes')) || [];

notes.splice(index,1);

localStorage.setItem(
'sii_notes',
JSON.stringify(notes)
);

loadNotes();

}

window.deleteNote = deleteNote;

loadNotes();

let mediaRecorder;

let audioChunks=[];

let recording=false;

const recordBtn =
document.getElementById('recordBtn');

const audioList =
document.getElementById('audioList');

recordBtn.addEventListener('click',async()=>{

if(!recording){

const stream =
await navigator.mediaDevices.getUserMedia({
audio:true
});

mediaRecorder = new MediaRecorder(stream);

mediaRecorder.start();

recording=true;

recordBtn.innerText='⏹ Stop';

mediaRecorder.ondataavailable=e=>{

audioChunks.push(e.data);

};

mediaRecorder.onstop=()=>{

const blob =
new Blob(audioChunks,{type:'audio/mp3'});

const url =
URL.createObjectURL(blob);

const audio =
document.createElement('audio');

audio.controls=true;

audio.src=url;

audioList.prepend(audio);

audioChunks=[];

};

}else{

mediaRecorder.stop();

recording=false;

recordBtn.innerText='🎙 Snimi';

}

});

const uploadMic =
document.getElementById('uploadMic');

const micImage =
document.getElementById('micImage');

uploadMic.addEventListener('change',function(e){

const file = e.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(event){

micImage.src = event.target.result;

localStorage.setItem(
'customMic',
event.target.result
);

}

reader.readAsDataURL(file);

}

});

const savedMic =
localStorage.getItem('customMic');

if(savedMic){

micImage.src = savedMic;

}

const quotes = [

'Uspeh dolazi onima koji ne odustaju.',

'Male navike grade veliku budućnost.',

'Disciplina danas, sloboda sutra.',

'Svaki dan je nova prilika za napredak.'

];

setInterval(()=>{

const random =
quotes[Math.floor(Math.random()*quotes.length)];

document.getElementById('quote')
.innerText = random;

},6000);

</script>

</body>
</html>
