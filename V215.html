<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUNA SMART PRO • 3D AI Sekretarica</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --mic-size: 135px;
      --plastic-thickness: 4px;
      --inset-depth: 4px;
      --shadow-outer-strength: 0.15;
      --shadow-inner-strength: 0.12;
      --widget-radius: 24px;
      
      /* Regleri za boje */
      --icon-opacity: 1.0;
      --icon-saturation: 100%;
      --text-contrast: #1e293b;
      --theme-hue: 221;
      --bg-lightness: 95%;

      /* Podrazumevane boje za Svetli Mod */
      --phone-bg: hsl(var(--theme-hue), 15%, var(--bg-lightness));
      --header-bg: #ffffff;
      --header-text: #1e293b;
      --panel-out-bg: #ffffff;
      --panel-inset-bg: hsl(var(--theme-hue), 20%, 98%);
      --item-bg-gradient-start: #ffffff;
      --item-bg-gradient-end: #f8fafc;
      --3d-light-reflection: rgba(255, 255, 255, 0.9);
      --3d-shadow-color: rgba(0, 0, 0, var(--shadow-outer-strength));
      --inset-shadow-color: rgba(0, 0, 0, var(--shadow-inner-strength));
    }

    /* Klasične CSS klase za TAMNI REŽIM (Dark Mode) */
    .dark-mode-active {
      --phone-bg: #0f172a;
      --header-bg: #1e293b;
      --header-text: #f8fafc;
      --panel-out-bg: #1e293b;
      --panel-inset-bg: #0b0f19;
      --item-bg-gradient-start: #1e293b;
      --item-bg-gradient-end: #0f172a;
      --text-contrast: #f1f5f9;
      --3d-light-reflection: rgba(255, 255, 255, 0.12);
      --3d-shadow-color: rgba(0, 0, 0, 0.5);
      --inset-shadow-color: rgba(0, 0, 0, 0.4);
    }

    body { font-family: 'Inter', sans-serif; background: #0f172a; }

    /* Fiksiran ram telefona */
    .phone-frame {
      width: 360px; height: 690px;
      background: #e2e8f0;
      border: 14px solid #1e2937;
      border-radius: 52px;
      overflow: hidden;
      box-shadow: 0 35px 70px -10px rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Duboki urez - efekat udubljenja u plastici */
    .panel-3d-inset {
      background: var(--panel-inset-bg);
      border-radius: var(--widget-radius);
      border-bottom: var(--inset-depth) solid var(--3d-light-reflection);
      border-right: var(--inset-depth) solid var(--3d-light-reflection);
      border-top: var(--inset-depth) solid rgba(0,0,0,0.2);
      border-left: var(--inset-depth) solid rgba(0,0,0,0.18);
      box-shadow: inset var(--inset-depth) var(--inset-depth) calc(var(--inset-depth) * 2) var(--inset-shadow-color), 
                  inset -2px -2px 5px var(--3d-light-reflection);
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    /* Ispupčeni 3D Plastični Panel */
    .panel-3d-out {
      background: var(--panel-out-bg);
      border-radius: var(--widget-radius);
      border-top: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-left: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-bottom: 2px solid rgba(0,0,0,0.15);
      border-right: 2px solid rgba(0,0,0,0.15);
      box-shadow: 5px 8px 16px var(--3d-shadow-color), 
                  -3px -3px 8px var(--3d-light-reflection);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* Utisnute stavke unutar liste */
    .item-3d-plastic {
      background: linear-gradient(145deg, var(--item-bg-gradient-start), var(--item-bg-gradient-end));
      border-radius: 14px;
      border-top: 2px solid var(--3d-light-reflection);
      border-left: 2px solid var(--3d-light-reflection);
      box-shadow: 2px 3px 6px rgba(0, 0, 0, 0.15), -1px -1px 4px var(--3d-light-reflection);
      transition: background 0.3s ease;
    }

    .avatar-container {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, hsl(var(--theme-hue), 85%, 60%), hsl(var(--theme-hue), 85%, 45%));
      box-shadow: 0 6px 12px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.4);
      animation: floatSlow 3.5s ease-in-out infinite;
      overflow: hidden;
      cursor: pointer;
    }

    @keyframes floatSlow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .icon-3d {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, var(--item-bg-gradient-start), var(--item-bg-gradient-end));
      border-radius: 50%; 
      box-shadow: 2px 4px 6px rgba(0,0,0,0.15), -2px -2px 5px var(--3d-light-reflection);
      overflow: hidden;
      flex-shrink: 0;
      filter: saturate(var(--icon-saturation));
      opacity: var(--icon-opacity);
    }

    .sasa-plastic-badge {
      background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%);
      color: white; font-weight: 800;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      padding: 5px 12px; border-radius: 16px;
      border-top: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 4px 8px rgba(2, 132, 199, 0.35);
    }

    /* Dugme za promenu Teme (Svetlo/Tamno) */
    .theme-toggle-btn {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      background: var(--panel-out-bg);
      border-top: 2px solid var(--3d-light-reflection);
      box-shadow: 2px 3px 6px var(--3d-shadow-color), -2px -2px 5px var(--3d-light-reflection);
      transition: all 0.3s ease;
    }

    .red-badge {
      position: absolute; top: -2px; right: -2px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: white; width: 18px; height: 18px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 900; border: 1.5px solid white;
      box-shadow: 0 2px 4px rgba(239,68,68,0.4);
    }

    .mic-container {
      width: var(--mic-size); height: var(--mic-size);
      background: linear-gradient(145deg, var(--item-bg-gradient-start), var(--item-bg-gradient-end));
      border-radius: 50%;
      box-shadow: 8px 12px 24px var(--3d-shadow-color), -6px -6px 16px var(--3d-light-reflection);
      cursor: pointer;
    }

    .listening .mic-container { animation: pulse 1.2s infinite; }
    @keyframes pulse { 50% { transform: scale(1.03); box-shadow: 0 0 20px hsl(var(--theme-hue), 85%, 60%); } }

    .btn-delete-round {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff4d4d, #cc0000);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 900;
      border-top: 1.5px solid rgba(255,255,255,0.4);
      box-shadow: 0 2px 4px rgba(204, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.2);
      cursor: pointer;
      flex-shrink: 0;
    }

    .mode-btn-active {
      background: linear-gradient(135deg, hsl(var(--theme-hue), 70%, 50%), hsl(var(--theme-hue), 70%, 40%)) !important;
      color: white !important;
      box-shadow: inset 2px 3px 6px rgba(0,0,0,0.4) !important;
      border: none !important;
    }

    .custom-text-clr { color: var(--text-contrast) !important; }
    .custom-icon-clr { filter: saturate(var(--icon-saturation)); opacity: var(--icon-opacity); }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-950">

  <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="changeAvatar(this)">
  <input type="file" id="note-upload" accept="image/*" class="hidden" onchange="changeIcon('note', this)">
  <input type="file" id="bell-upload" accept="image/*" class="hidden" onchange="changeIcon('bell', this)">
  <input type="file" id="mic-upload" accept="image/*" class="hidden" onchange="changeMicImage(this)">

  <div class="phone-frame" id="phone-body">
    
    <div class="px-4 py-2.5 flex items-center justify-between border-b shadow-sm z-10" style="background-color: var(--header-bg); border-color: var(--3d-light-reflection);">
      <div class="flex items-center gap-2.5">
        <div onclick="triggerFile('avatar-upload')" id="avatar-holder" class="avatar-container flex items-center justify-center">
          <i class="fa-solid fa-robot text-white text-2xl"></i>
        </div>
        <div>
          <div class="font-black text-sm tracking-tight" style="color: var(--header-text);" id="lbl-luna">Luna</div>
          <div class="text-[10px] text-slate-400 font-bold -mt-0.5" id="lbl-status-mod">Smart AI Režim</div>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <div onclick="toggleThemeMode()" class="theme-toggle-btn" id="theme-btn-icon">
          <i class="fa-solid fa-moon text-amber-500 text-xs"></i>
        </div>
        <div class="sasa-plastic-badge text-[11px]" id="badge-sasa">Saša</div>
      </div>
    </div>

    <div id="home-screen" class="flex-1 flex flex-col justify-between p-3 overflow-hidden transition-colors duration-300" style="background-color: var(--phone-bg);">
      
      <div class="flex gap-2.5 h-[175px] shrink-0">
        <div class="w-[48%] flex flex-col gap-2.5">
          <div onclick="selectSection('notes')" class="panel-3d-inset p-2 cursor-pointer relative flex-1 flex items-center">
            <div class="flex items-center gap-2 w-full px-1">
              <div id="note-icon" class="icon-3d"><i class="fa-solid fa-note-sticky text-blue-500 text-sm custom-icon-clr"></i></div>
              <div class="font-extrabold text-[11px] custom-text-clr truncate">Beleške</div>
              <div id="badge-notes" class="red-badge">0</div>
            </div>
          </div>

          <div onclick="selectSection('alarms')" class="panel-3d-inset p-2 cursor-pointer relative flex-1 flex items-center">
            <div class="flex items-center gap-2 w-full px-1">
              <div id="bell-icon" class="icon-3d"><i class="fa-solid fa-bell text-yellow-500 text-sm custom-icon-clr"></i></div>
              <div class="font-extrabold text-[11px] custom-text-clr truncate">Alarmi</div>
              <div id="badge-alarms" class="red-badge">0</div>
            </div>
          </div>
        </div>

        <div class="flex-1 panel-3d-out p-2.5 overflow-y-auto shadow-inner">
          <div id="preview-content" class="text-[11px] font-bold custom-text-clr"></div>
        </div>
      </div>

      <div class="panel-3d-inset p-1.5 flex justify-between gap-1 mt-1 shrink-0">
        <button id="mod-smart" onclick="setAiMode('smart')" class="flex-1 py-2 text-[9px] font-black rounded-xl bg-transparent custom-text-clr transition">🧠 Pametna</button>
        <button id="mod-funny" onclick="setAiMode('funny')" class="flex-1 py-2 text-[9px] font-black rounded-xl bg-transparent custom-text-clr transition">🤪 Šaljiva</button>
        <button id="mod-expert" onclick="setAiMode('expert')" class="flex-1 py-2 text-[9px] font-black rounded-xl bg-transparent custom-text-clr transition">🔮 Sveznalica</button>
        <button id="mod-pro" onclick="setAiMode('pro')" class="flex-1 py-2 text-[9px] font-black rounded-xl bg-transparent custom-text-clr transition">💼 Profi</button>
      </div>

      <div class="flex flex-col items-center justify-center mb-1 mt-auto">
        <div id="mic-trigger" onclick="toggleListening()" class="mic-container flex items-center justify-center">
          <div id="mic-inner" class="w-[86%] h-[86%] bg-transparent rounded-full flex items-center justify-center overflow-hidden shadow-inner">
            <i id="mic-icon-graphic" class="fa-solid fa-microphone text-blue-500 text-2xl custom-icon-clr"></i>
          </div>
        </div>
        <span id="mic-status-text" class="mt-2 text-[9px] font-black tracking-widest text-slate-400 text-center uppercase">DODIRNI I KAŽI KOMANDU</span>
      </div>
    </div>

    <div id="settings-screen" class="hidden flex-1 p-3 overflow-y-auto transition-colors duration-300" style="background-color: var(--phone-bg);">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-sm font-black custom-text-clr">⚙️ Kontrolna Tabla</h2>
        <i onclick="changeScreen('home')" class="fa-solid fa-arrow-left text-lg cursor-pointer text-slate-400 p-1"></i>
      </div>
      
      <div class="space-y-3 text-[11px]">
        <div class="panel-3d-out p-3 space-y-2">
          <p class="font-black text-blue-500 uppercase tracking-wide border-b pb-1 text-[10px]">📐 1. Geometrija i 3D Efekti</p>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">1. Veličina kruga mikrofona: <span id="lbl-mic">135px</span></label>
            <input type="range" min="100" max="180" value="135" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('mic', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">2. Debljina spoljne plastike: <span id="lbl-thick">4px</span></label>
            <input type="range" min="1" max="8" value="4" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('thick', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">3. Dubina unutrašnjih ureza: <span id="lbl-inset">4px</span></label>
            <input type="range" min="1" max="8" value="4" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('inset', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">4. Jačina spoljnih senki: <span id="lbl-sh-out">15%</span></label>
            <input type="range" min="5" max="40" value="15" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('sh-out', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">5. Dubina senke udubljenja: <span id="lbl-sh-in">12%</span></label>
            <input type="range" min="5" max="35" value="12" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('sh-in', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">6. Zaobljenost ćoškova: <span id="lbl-rad">24px</span></label>
            <input type="range" min="8" max="36" value="24" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('radius', this.value)">
          </div>
        </div>

        <div class="panel-3d-out p-3 space-y-2">
          <p class="font-black text-emerald-500 uppercase tracking-wide border-b pb-1 text-[10px]">🎨 2. Intenzitet i Kontrast Boja</p>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">7. Vidljivost ikona: <span id="lbl-c-ico">100%</span></label>
            <input type="range" min="30" max="100" value="100" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('c-ico', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">8. Zasićenost boja ikonica: <span id="lbl-sat-ico">100%</span></label>
            <input type="range" min="50" max="200" value="100" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('sat-ico', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">9. Kontrast slova (Svetli mod): <span id="lbl-c-txt">Normalna</span></label>
            <input type="range" min="1" max="3" value="1" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('c-txt', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-0.5">10. Svetlina pozadine: <span id="lbl-bg-light">95%</span></label>
            <input type="range" min="80" max="98" value="95" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('bg-light', this.value)">
          </div>
        </div>

        <div class="panel-3d-out p-3">
          <p class="font-bold custom-text-clr mb-1">🔑 Groq AI API Ključ</p>
          <input type="password" id="groq-key" placeholder="gsk_..." class="w-full p-2 border rounded-xl bg-transparent custom-text-clr text-[11px]">
          <button onclick="saveGroqKey()" class="mt-2 w-full bg-blue-600 text-white py-1.5 rounded-xl font-bold">Sačuvaj Ključ</button>
        </div>
      </div>
    </div>

    <div class="h-12 border-t flex items-center justify-around text-lg text-slate-400 z-10 shrink-0" style="background-color: var(--header-bg); border-color: var(--3d-light-reflection);">
      <i class="fa-solid fa-house cursor-pointer hover:text-blue-500" onclick="changeScreen('home')"></i>
      <i class="fa-solid fa-sliders cursor-pointer hover:text-blue-500" onclick="changeScreen('settings')"></i>
    </div>
  </div>

  <script>
    let groqKey = localStorage.getItem('groq_key') || '';
    let currentAiMode = localStorage.getItem('luna_ai_mode') || 'smart';
    let themeMode = localStorage.getItem('luna_theme_mode') || 'light'; // Pamti 'light' ili 'dark'
    let appData = JSON.parse(localStorage.getItem('luna_app_data')) || { notes: [], alarms: [] };
    let activeSection = 'notes';
    let isListening = false;
    let recognition;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function sacuvajUMemoriju() { localStorage.setItem('luna_app_data', JSON.stringify(appData)); }
    function changeScreen(screen) {
      document.getElementById('home-screen').classList.toggle('hidden', screen !== 'home');
      document.getElementById('settings-screen').classList.toggle('hidden', screen !== 'settings');
    }

    function saveGroqKey() {
      const keyInput = document.getElementById('groq-key').value.trim();
      if (keyInput) { groqKey = keyInput; localStorage.setItem('groq_key', groqKey); alert("✅ Ključ sačuvan!"); }
    }

    // UPRAVLJANJE SVETLIM I TAMNIM MODOM
    function toggleThemeMode() {
      themeMode = (themeMode === 'light') ? 'dark' : 'light';
      localStorage.setItem('luna_theme_mode', themeMode);
      primeniTemu();
    }

    function primeniTemu() {
      const ram = document.getElementById('phone-body');
      const ikonaDugmeta = document.getElementById('theme-btn-icon');
      
      if (themeMode === 'dark') {
        ram.classList.add('dark-mode-active');
        ikonaDugmeta.innerHTML = `<i class="fa-solid fa-sun text-yellow-400 text-xs"></i>`;
      } else {
        ram.classList.remove('dark-mode-active');
        ikonaDugmeta.innerHTML = `<i class="fa-solid fa-moon text-slate-500 text-xs"></i>`;
      }
    }

    function setAiMode(mod) {
      currentAiMode = mod; localStorage.setItem('luna_ai_mode', mod);
      document.querySelectorAll('[id^="mod-"]').forEach(btn => btn.classList.remove('mode-btn-active'));
      document.getElementById(`mod-${mod}`).classList.add('mode-btn-active');
      const nazivi = { smart: "Pametna AI", funny: "Šaljiva AI", expert: "Sveznalica AI", pro: "Profi AI" };
      document.getElementById('lbl-status-mod').innerText = nazivi[mod] + " Režim";
    }

    function triggerFile(id) { document.getElementById(id).click(); }
    function changeAvatar(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => { 
        document.getElementById('avatar-holder').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
        localStorage.setItem('saved_avatar', e.target.result);
      };
      reader.readAsDataURL(input.files[0]);
    }

    function changeIcon(type, input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        const html = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-full">`;
        if (type === 'note') { document.getElementById('note-icon').innerHTML = html; localStorage.setItem('saved_icon_note', e.target.result); }
        else if (type === 'bell') { document.getElementById('bell-icon').innerHTML = html; localStorage.setItem('saved_icon_bell', e.target.result); }
      };
      reader.readAsDataURL(input.files[0]);
    }

    function changeMicImage(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => { 
        document.getElementById('mic-inner').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`; 
        localStorage.setItem('saved_mic_img', e.target.result);
      };
      reader.readAsDataURL(input.files[0]);
    }

    function updateStyle(prop, val) {
      const root = document.documentElement;
      if (prop === 'mic') { root.style.setProperty('--mic-size', val + 'px'); document.getElementById('lbl-mic').innerText = val + 'px'; localStorage.setItem('reg_mic', val); }
      else if (prop === 'thick') { root.style.setProperty('--plastic-thickness', val + 'px'); document.getElementById('lbl-thick').innerText = val + 'px'; localStorage.setItem('reg_thick', val); }
      else if (prop === 'inset') { root.style.setProperty('--inset-depth', val + 'px'); document.getElementById('lbl-inset').innerText = val + 'px'; localStorage.setItem('reg_inset', val); }
      else if (prop === 'sh-out') { root.style.setProperty('--shadow-outer-strength', (val/100)); document.getElementById('lbl-sh-out').innerText = val + '%'; localStorage.setItem('reg_sh_out', val); }
      else if (prop === 'sh-in') { root.style.setProperty('--shadow-inner-strength', (val/100)); document.getElementById('lbl-sh-in').innerText = val + '%'; localStorage.setItem('reg_sh_in', val); }
      else if (prop === 'radius') { root.style.setProperty('--widget-radius', val + 'px'); document.getElementById('lbl-rad').innerText = val + 'px'; localStorage.setItem('reg_radius', val); }
      else if (prop === 'c-ico') { root.style.setProperty('--icon-opacity', (val/100)); document.getElementById('lbl-c-ico').innerText = val + '%'; localStorage.setItem('reg_c_ico', val); }
      else if (prop === 'sat-ico') { root.style.setProperty('--icon-saturation', val + '%'); document.getElementById('lbl-sat-ico').innerText = val + '%'; localStorage.setItem('reg_sat-ico', val); }
      else if (prop === 'c-txt') {
        if(themeMode === 'light') {
          let colors = { "1": "#1e293b", "2": "#0f172a", "3": "#000000" };
          root.style.setProperty('--text-contrast', colors[val]);
        }
        let labels = { "1": "Normalna", "2": "Duboka", "3": "Maksimalna" };
        document.getElementById('lbl-c-txt').innerText = labels[val];
        localStorage.setItem('reg_c_txt', val);
      }
      else if (prop === 'bg-light') { root.style.setProperty('--bg-lightness', val + '%'); document.getElementById('lbl-bg-light').innerText = val + '%'; localStorage.setItem('reg_bg_light', val); }
    }

    function obrisiBelesku(index) { appData.notes.splice(index, 1); sacuvajUMemoriju(); updateDisplay(); lunaGovori("Beleška obrisana."); }
    function obrisiAlarm(index) { appData.alarms.splice(index, 1); sacuvajUMemoriju(); updateDisplay(); lunaGovori("Uklonjeno."); }

    function updateDisplay() {
      document.getElementById('badge-notes').innerText = appData.notes.length;
      document.getElementById('badge-alarms').innerText = appData.alarms.length;
      const content = document.getElementById('preview-content');
      
      if (activeSection === 'notes') {
        let html = `<h3 class="font-black text-[11px] text-blue-500 mb-1.5 uppercase tracking-wide">📝 Beleške</h3><ul class="space-y-1.5">`;
        if (appData.notes.length === 0) html += `<p class="text-slate-400 text-center py-4">Nema stavki</p>`;
        appData.notes.forEach((n, idx) => {
          html += `
            <li class="item-3d-plastic p-2 px-2.5 flex justify-between items-center gap-2">
              <span class="font-bold text-[11px] custom-text-clr truncate flex-1">${n}</span>
              <div onclick="obrisiBelesku(${idx})" class="btn-delete-round"><i class="fa-solid fa-xmark"></i></div>
            </li>`;
        });
        content.innerHTML = html + `</ul>`;
      } else {
        let html = `<h3 class="font-black text-[11px] text-yellow-500 mb-1.5 uppercase tracking-wide">⏰ Alarmi</h3><ul class="space-y-1.5">`;
        if (appData.alarms.length === 0) html += `<p class="text-slate-400 text-center py-4">Nema alarma</p>`;
        appData.alarms.forEach((a, idx) => {
          html += `
            <li class="item-3d-plastic p-2 px-2.5 flex justify-between items-center gap-2 border-l-4 border-l-amber-500">
              <span class="font-black text-[11px] text-amber-600 truncate flex-1">[${a.time}] ${a.label}</span>
              <div onclick="obrisiAlarm(${idx})" class="btn-delete-round"><i class="fa-solid fa-xmark"></i></div>
            </li>`;
        });
        content.innerHTML = html + `</ul>`;
      }
    }

    function selectSection(section) { activeSection = section; updateDisplay(); }

    function lunaGovori(tekst) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const govornik = new SpeechSynthesisUtterance(tekst);
        govornik.lang = 'sr-RS'; govornik.pitch = 1.05; govornik.rate = 0.95;
        window.speechSynthesis.speak(govornik);
      }
    }

      let tekst = izgovor.toLowerCase().trim();
      document.getElementById('mic-status-text').innerText = "OBRAĐUJEM REČENO...";
      pitajGroqAI(izgovor);
    }
