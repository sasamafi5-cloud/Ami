<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUNA • 3D AI Sekretarica</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body { font-family: 'Inter', sans-serif; background: #0f172a; }

    .phone-frame {
      width: 360px; height: 690px;
      background: #e2e8f0;
      border: 14px solid #1e2937;
      border-radius: 52px;
      overflow: hidden;
      box-shadow: 0 35px 70px -10px rgba(0,0,0,0.9);
    }

    .panel-3d {
      background: #ffffff;
      border-radius: 24px;
      border-top: 4px solid rgba(255,255,255,0.9);
      border-left: 4px solid rgba(255,255,255,0.85);
      box-shadow: 12px 16px 28px rgba(0,0,0,0.28), -8px -8px 22px rgba(255,255,255,0.9);
    }

    .logo-l, .sasa-badge {
      animation: floatSlow 3.5s ease-in-out infinite;
    }

    @keyframes floatSlow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* Promenjeno u border-radius: 50% da bi ikonice u startu bile okrugle */
    .icon-3d {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #f8fafc, #e2e8f0);
      border-radius: 50%; 
      box-shadow: 6px 8px 16px rgba(0,0,0,0.35), -5px -5px 12px rgba(255,255,255,0.9);
      overflow: hidden; /* Osigurava da slika unutar kruga ne pređe ivice */
    }

    .red-badge {
      position: absolute; top: -6px; right: -6px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white; width: 24px; height: 24px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900; border: 2px solid white;
    }

    .mic-container {
      width: 172px; height: 172px;
      background: linear-gradient(145deg, #f8fafc, #e2e8f0);
      border-radius: 9999px;
      box-shadow: 16px 20px 38px rgba(0,0,0,0.35), -12px -12px 28px rgba(255,255,255,0.9);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .listening .mic-container { animation: pulse 1.5s infinite; }
    @keyframes pulse { 50% { transform: scale(1.08); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-950">

  <!-- Skriveni inputi za upload fajlova koji su nedostajali -->
  <input type="file" id="note-upload" accept="image/*" class="hidden" onchange="changeIcon('note', this)">
  <input type="file" id="bell-upload" accept="image/*" class="hidden" onchange="changeIcon('bell', this)">
  <input type="file" id="mic-upload" accept="image/*" class="hidden" onchange="changeMicImage(this)">

  <div class="phone-frame flex flex-col justify-between">
    
    <!-- HEADER -->
    <div class="px-5 py-4 flex items-center justify-between bg-white border-b">
      <div class="flex items-center gap-3">
        <div class="logo-l bg-blue-600 text-white font-bold w-8 h-8 rounded-full flex items-center justify-center">L</div>
        <div>
          <div class="font-semibold text-xl">Luna</div>
          <div class="text-xs text-slate-500 -mt-1">3D AI Sekretarica</div>
        </div>
      </div>
      <div class="sasa-badge bg-slate-200 text-slate-700 px-3 py-1 rounded-full text-xs font-bold">Saša</div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="flex-1 bg-slate-100 p-4 flex flex-col gap-4">
      <div class="flex gap-3 h-[255px]">
        <div class="w-1/2 flex flex-col gap-3">
          <div onclick="selectSection('notes')" class="panel-3d p-4 cursor-pointer relative flex-1 flex flex-col justify-center">
            <div class="flex items-center gap-3">
              <div id="note-icon" class="icon-3d"><i class="fa-solid fa-note-sticky text-blue-600 text-xl"></i></div>
              <div class="font-semibold text-base">Beleške</div>
              <div class="red-badge">3</div>
            </div>
          </div>

          <div onclick="selectSection('alarms')" class="panel-3d p-4 cursor-pointer relative flex-1 flex flex-col justify-center">
            <div class="flex items-center gap-3">
              <div id="bell-icon" class="icon-3d"><i class="fa-solid fa-bell text-yellow-500 text-xl"></i></div>
              <div class="font-semibold text-base">Alarmi</div>
              <div class="red-badge">2</div>
            </div>
          </div>
        </div>

        <div class="flex-1 panel-3d p-5 overflow-y-auto">
          <div id="preview-content" class="text-sm"></div>
        </div>
      </div>

      <div class="flex-1 flex flex-col items-center justify-center">
        <div id="mic-container" onclick="toggleListening()" class="mic-container flex items-center justify-center">
          <div id="mic-inner" class="w-[118px] h-[118px] bg-blue-50 rounded-full flex items-center justify-center overflow-hidden">
            <i id="mic-icon-graphic" class="fa-solid fa-microphone text-blue-700 text-5xl"></i>
          </div>
        </div>
        <span id="mic-status-text" class="mt-6 text-xs font-bold tracking-widest text-slate-500">DODIRNI ZA RAZGOVOR</span>
      </div>
    </div>

    <!-- SETTINGS SCREEN -->
    <div id="settings-screen" class="hidden flex-1 bg-slate-100 p-4 overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">⚙️ Podešavanja</h2>
        <i onclick="changeScreen('home')" class="fa-solid fa-arrow-left text-3xl cursor-pointer text-slate-600"></i>
      </div>
      
      <div class="space-y-6">
        <!-- API Ključ -->
        <div class="panel-3d p-5">
          <p class="font-medium mb-2">Groq API Ključ</p>
          <input type="password" id="groq-key" placeholder="gsk_..." class="w-full p-3 border border-slate-300 rounded-2xl">
          <button onclick="saveGroqKey()" class="mt-3 w-full bg-green-600 text-white py-3 rounded-2xl font-semibold">Sačuvaj Ključ</button>
        </div>

        <!-- Upload dugmad -->
        <div class="panel-3d p-5">
          <p class="font-medium mb-3">Promeni izgled:</p>
          <button onclick="triggerFile('note-upload')" class="w-full py-4 bg-blue-100 active:bg-blue-200 rounded-2xl mb-3 font-medium text-blue-800">📸 Promeni ikonu Beleški</button>
          <button onclick="triggerFile('bell-upload')" class="w-full py-4 bg-amber-100 active:bg-amber-200 rounded-2xl mb-3 font-medium text-amber-800">📸 Promeni ikonu Alarma</button>
          <button onclick="triggerFile('mic-upload')" class="w-full py-4 bg-emerald-100 active:bg-emerald-200 rounded-2xl font-medium text-emerald-800">📸 Promeni izgled mikrofona</button>
        </div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="h-14 bg-white border-t flex items-center justify-around text-2xl text-slate-400">
      <i class="fa-solid fa-house cursor-pointer hover:text-blue-600" onclick="changeScreen('home')"></i>
      <i class="fa-solid fa-sliders cursor-pointer hover:text-blue-600" onclick="changeScreen('settings')"></i>
    </div>
  </div>

  <script>
    let groqKey = localStorage.getItem('groq_key') || '';
    let recognition;
    let isListening = false;

    function changeScreen(screen) {
      document.getElementById('home-screen').classList.toggle('hidden', screen !== 'home');
      document.getElementById('settings-screen').classList.toggle('hidden', screen !== 'settings');
    }

    function saveGroqKey() {
      const keyInput = document.getElementById('groq-key').value.trim();
      if (keyInput) {
        groqKey = keyInput;
        localStorage.setItem('groq_key', groqKey);
        alert("✅ API ključ sačuvan!");
      } else {
        localStorage.removeItem('groq_key');
        groqKey = '';
        alert("⚠️ Ključ uklonjen.");
      }
    }

    function selectSection(section) {
      const content = document.getElementById('preview-content');
      content.innerHTML = section === 'notes' ? 
        `<h3 class="font-bold text-base border-b pb-1 mb-2">Beleške</h3><p class="text-sm text-slate-700 leading-relaxed">• Kupiti poklon<br>• Završiti projekat</p>` :
        `<h3 class="font-bold text-base border-b pb-1 mb-2">Alarmi</h3><p class="text-sm text-slate-700 leading-relaxed">⏰ 07:30 — Buđenje<br>🍽️ 12:00 — Ručak</p>`;
    }

    function triggerFile(id) {
      document.getElementById(id).click();
    }

    function changeIcon(type, input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        // Dodata klasa rounded-full i h-full w-full object-cover da slika bude savršen krug
        const html = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-full">`;
        if (type === 'note') {
          document.getElementById('note-icon').innerHTML = html;
        } else {
          document.getElementById('bell-icon').innerHTML = html;
        }
        alert("✅ Ikona uspešno promenjena u okrugli oblik!");
      };
      reader.readAsDataURL(input.files[0]);
    }

    function changeMicImage(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        // Podešeno da i unutrašnjost mikrofona lepo prihvati sliku preko celog kruga
        document.getElementById('mic-inner').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-full">`;
        alert("✅ Izgled mikrofona promenjen!");
      };
      reader.readAsDataURL(input.files[0]);
    }

    function toggleListening() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        alert("⚠️ Vaš pregledač ne podržava prepoznavanje glasa (Web Speech API). Pokušajte u Google Chrome-u.");
        return;
      }

      if (!recognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'sr-RS';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
          isListening = true;
          document.getElementById('home-screen').classList.add('listening');
          document.getElementById('mic-status-text').innerText = "SLUŠAM...";
          document.getElementById('mic-status-text').classList.remove('text-slate-500');
          document.getElementById('mic-status-text').classList.add('text-blue-600');
        };

        recognition.onresult = (e) => {
          const text = e.results[0][0].transcript;
          const previewContent = document.getElementById('preview-content');
          
          previewContent.innerHTML = `
            <div class="space-y-2">
              <p class="text-blue-600 font-medium">🗣️ Ti: "${text}"</p>
              <p class="text-emerald-600 font-medium mt-2">🤖 Luna: Razumela sam te, Saša.</p>
            </div>
          `;
        };

        recognition.onerror = (e) => {
          console.error(e);
          resetMicUI();
        };

        recognition.onend = () => {
          resetMicUI();
        };
      }

      if (isListening) {
        recognition.stop();
      } else {
        recognition.start();
      }
    }

    function resetMicUI() {
      isListening = false;
      document.getElementById('home-screen').classList.remove('listening');
      document.getElementById('mic-status-text').innerText = "DODIRNI ZA RAZGOVOR";
      document.getElementById('mic-status-text').classList.remove('text-blue-600');
      document.getElementById('mic-status-text').classList.add('text-slate-500');
    }

    window.onload = () => {
      changeScreen('home');
      selectSection('notes');
      if (groqKey) document.getElementById('groq-key').value = groqKey;
    };
  </script>
</body>
</html>
