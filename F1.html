<!DOCTYPE html>
<html lang="sr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GroceryAI • 2035</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.3); }
    .neon { box-shadow: 0 0 25px #22d3ee; }
    .avatar-float { animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    .emoji { font-size: 48px; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-24">

  <div class="max-w-xl mx-auto px-4 pt-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Grocery<span class="text-cyan-400">AI</span></h1>
      <button onclick="updatePrices()" class="bg-emerald-600 px-4 py-2 rounded-2xl text-sm font-semibold">🔄 Ažuriraj cene</button>
    </div>

    <!-- AVATAR -->
    <div class="flex gap-6 items-center mb-8">
      <div class="flex-1">
        <h2 class="text-2xl font-semibold">Zdravo, Marko! 👋</h2>
        <p class="text-cyan-400">Kako mogu da ti pomognem danas?</p>
      </div>
      <img id="avatarImg" src="https://picsum.photos/id/1015/600/600" class="w-40 h-40 rounded-3xl object-cover avatar-float neon border-4 border-cyan-400/50" alt="AI">
    </div>

    <!-- VOICE -->
    <button onclick="startVoiceRecognition()" class="w-full glass rounded-3xl py-6 flex items-center justify-center gap-4 text-xl font-semibold neon mb-8">
      🎤 Pritisni i pričaj
    </button>

    <!-- AI PREDLOZI -->
    <h3 class="text-lg font-semibold mb-4">AI Predlozi • Najbolje cene</h3>
    <div class="grid grid-cols-2 gap-3" id="suggestions"></div>

    <!-- KORPA -->
    <h3 class="text-lg font-semibold mt-10 mb-4">Tvoja korpa <span id="cart-count" class="text-cyan-400">(0)</span></h3>
    <div id="cart" class="glass rounded-3xl p-5 space-y-4 min-h-[200px]"></div>

    <div class="mt-8 flex justify-between items-center">
      <div>
        <p class="text-gray-400">Ukupno</p>
        <p id="total" class="text-4xl font-bold text-cyan-400">0 RSD</p>
      </div>
      <button onclick="checkout()" class="bg-gradient-to-r from-cyan-500 to-purple-600 px-12 py-5 rounded-3xl text-lg font-bold">Završi kupovinu</button>
    </div>
  </div>

  <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 py-3">
    <div class="max-w-xl mx-auto flex justify-around text-3xl">
      <button class="text-cyan-400">🏠</button>
      <button onclick="alert('Pretraga')">🔍</button>
      <button onclick="alert('Skeniraj')">📸</button>
      <button>🛒</button>
      <button onclick="changeAvatar()">👤</button>
    </div>
  </nav>

  <script>
    // Veći spisak namirnica sa realnim cenama u Srbiji (maj 2026)
    let products = [
      { name: "Jaja 10kom", price: 179, store: "Lidl", emoji: "🥚" },
      { name: "Pomorandže 1kg", price: 149, store: "Maxi", emoji: "🍊" },
      { name: "Jogurt 1kg", price: 125, store: "Idea", emoji: "🥛" },
      { name: "Jabuke 1kg", price: 89, store: "Univerexport", emoji: "🍎" },
      { name: "Banane 1kg", price: 95, store: "Lidl", emoji: "🍌" },
      { name: "Mleko 1L", price: 98, store: "Idea", emoji: "🥛" },
      { name: "Hleb beli 500g", price: 65, store: "Maxi", emoji: "🍞" },
      { name: "Piletina grudi 1kg", price: 489, store: "Lidl", emoji: "🍗" },
      { name: "Paradajz 1kg", price: 129, store: "Univerexport", emoji: "🍅" },
      { name: "Krastavac 1kg", price: 89, store: "Idea", emoji: "🥒" },
      { name: "Sir beli 400g", price: 245, store: "Maxi", emoji: "🧀" },
      { name: "Kafa 100g", price: 189, store: "Lidl", emoji: "☕" },
      { name: "Pirinač 1kg", price: 135, store: "Univerexport", emoji: "🍚" },
      { name: "Testenina 500g", price: 75, store: "Idea", emoji: "🍝" },
      { name: "Ulje suncokretovo 1L", price: 139, store: "Lidl", emoji: "🛢️" },
      { name: "Šećer 1kg", price: 95, store: "Maxi", emoji: "🧂" },
      { name: "Krompir 2kg", price: 120, store: "Idea", emoji: "🥔" },
      { name: "Biftek 1kg", price: 899, store: "Univerexport", emoji: "🥩" },
      { name: "Čokolada 100g", price: 89, store: "Lidl", emoji: "🍫" },
      { name: "Pivo 0.5L", price: 65, store: "Maxi", emoji: "🍺" }
    ];

    let cart = [];
    let total = 0;

    function renderSuggestions() {
      const container = document.getElementById('suggestions');
      container.innerHTML = '';
      products.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'glass rounded-3xl p-4 text-center cursor-pointer';
        div.innerHTML = `
          <div class="emoji mx-auto">${p.emoji}</div>
          <p class="mt-2 font-medium">${p.name}</p>
          <p class="text-cyan-400 font-bold">${p.price} RSD</p>
          <p class="text-xs text-gray-400">${p.store}</p>
          <button onclick="addToCart(${i}); event.stopImmediatePropagation()" 
                  class="mt-4 w-full py-2 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-2xl text-sm">Dodaj u korpu</button>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(i) {
      cart.push(products[i]);
      total += products[i].price;
      renderCart();
    }

    function renderCart() {
      const el = document.getElementById('cart');
      el.innerHTML = cart.length === 0 ? '<p class="text-center text-gray-500 py-12">Korpa je prazna...</p>' : '';
      
      cart.forEach((item, i) => {
        el.innerHTML += `
          <div class="flex items-center gap-4 bg-zinc-900/60 rounded-2xl p-3">
            <span class="text-4xl">${item.emoji}</span>
            <div class="flex-1">
              <p>${item.name}</p>
              <p class="text-xs text-gray-400">${item.store}</p>
            </div>
            <p class="font-bold">${item.price} RSD</p>
            <button onclick="removeFromCart(${i})" class="text-red-400 text-2xl">✕</button>
          </div>
        `;
      });
      document.getElementById('total').textContent = total + " RSD";
      document.getElementById('cart-count').textContent = `(${cart.length})`;
    }

    function removeFromCart(i) {
      total -= cart[i].price;
      cart.splice(i, 1);
      renderCart();
    }

    function updatePrices() {
      alert("🔄 Cene su ažurirane iz kataloga Lidl, Idea, Maxi i Univerexport (maj 2026).");
      // Ovde bi u pravoj aplikaciji išao fetch sa API-ja
      renderSuggestions();
    }

    function startVoiceRecognition() {
      alert("🎤 AI: Zdravo! Trenutno su najjeftinije pomorandže u Lidlu i piletina u Maxi-ju.");
    }

    function changeAvatar() {
      const url = prompt("Unesi novi URL za avatar:", document.getElementById('avatarImg').src);
      if (url) document.getElementById('avatarImg').src = url;
    }

    function checkout() {
      if (cart.length === 0) return alert("Korpa je prazna!");
      alert(`✅ Kupovina završena!\nUkupno: ${total} RSD\nHvala što koristiš GroceryAI!`);
      cart = []; total = 0; renderCart();
    }

    window.onload = () => {
      renderSuggestions();
      renderCart();
    };
  </script>
</body>
</html>
