<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ami • AI Sekretarica</title>
  <meta name="theme-color" content="#e0e4eb">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e0e4eb;
      color: #333;
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }
    .header {
      padding: 15px 20px;
      background: #e0e4eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1),
                  inset 0 -4px 8px rgba(255,255,255,0.8);
    }
    .tabs {
      display: flex;
      background: #e0e4eb;
      margin: 10px 15px;
      border-radius: 50px;
      padding: 6px;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.15),
                  0 4px 10px rgba(255,255,255,0.9);
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      border-radius: 50px;
      font-weight: 600;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    .tab.active {
      background: #e0e4eb;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.2),
                  0 4px 12px rgba(255,255,255,0.9);
    }

    .container { display: flex; height: calc(100vh - 180px); }
    .sidebar {
      width: 300px;
      background: #e0e4eb;
      padding: 12px;
      overflow-y: auto;
      box-shadow: 6px 0 15px rgba(0,0,0,0.12),
                  inset -6px 0 10px rgba(255,255,255,0.7);
    }
    .neumorph {
      background: #e0e4eb;
      border-radius: 18px;
      padding: 16px;
      margin: 10px 8px;
      box-shadow: 8px 8px 16px rgba(0,0,0,0.15),
                  -8px -8px 16px rgba(255,255,255,0.9);
      transition: all 0.3s;
    }
    .neumorph:active {
      box-shadow: inset 6px 6px 12px rgba(0,0,0,0.2),
                  inset -6px -6px 12px rgba(255,255,255,0.8);
    }

    .main-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #e0e4eb;
    }

    .mic-container {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 140px;
      height: 140px;
      background: #e0e4eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 12px 12px 24px rgba(0,0,0,0.2),
                  -12px -12px 24px rgba(255,255,255,0.9),
                  inset 0 0 30px rgba(0,180,255,0.3);
      cursor: pointer;
      overflow: hidden;
      border: 12px solid #e0e4eb;
    }
    .mic-container img, .mic-container span {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .status {
      position: fixed;
      bottom: 190px;
      left: 0; right: 0;
      text-align: center;
      font-size: 1.2rem;
      color: #0066cc;
      padding: 0 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <strong>Ami</strong>
    <div><span style="color:#34c759;">●</span> Online</div>
    <div id="time">23:15</div>
  </div>

  <div class="tabs">
    <div class="tab active">Quick Notes</div>
    <div class="tab">Alarmi</div>
  </div>

  <div class="container">
    <!-- Leva strana -->
    <div class="sidebar">
      <div class="neumorph" onclick="selectCategory(0)">💡 Ideas <span style="float:right; background:#ff2d55; color:white; padding:2px 10px; border-radius:50%;">3</span></div>
      <div class="neumorph" onclick="selectCategory(1)">✅ To-Do <span style="float:right; background:#ff2d55; color:white; padding:2px 10px; border-radius:50%;">5</span></div>
      <div class="neumorph" onclick="selectCategory(2)">📋 Meeting Notes <span style="float:right; background:#ff2d55; color:white; padding:2px 10px; border-radius:50%;">8</span></div>
      <div class="neumorph" onclick="selectCategory(3)">📄 Random Drafts</div>

      <div style="margin:20px 10px 10px; color:#666;">Današnji alarmi</div>
      <div class="neumorph" onclick="showAlarm(0)">⏰ Morning Workout - 8:00</div>
      <div class="neumorph" onclick="showAlarm(1)">📞 Client Call - 14:30</div>
    </div>

    <!-- Desna strana -->
    <div class="main-area" id="mainArea">
      <h2 id="title">Dobrodošao!</h2>
      <p id="content">Pritisni neku kategoriju sa leve strane ili veliki mikrofon.</p>
    </div>
  </div>

  <!-- Veliki Neumorphic Mikrofon -->
  <div class="mic-container" id="micContainer">
    <span style="font-size:85px;">🎤</span>
  </div>

  <input type="file" id="uploadMic" accept="image/*" style="display:none;">
  <button onclick="document.getElementById('uploadMic').click()" 
          style="position:fixed; bottom:180px; right:25px; padding:8px 14px; border-radius:50px; background:#e0e4eb; box-shadow: 4px 4px 8px rgba(0,0,0,0.15); border:none;">
    📸 Promeni mikrofon
  </button>

  <div class="status" id="status"></div>

  <script>
    // Vreme
    setInterval(() => {
      const d = new Date();
      document.getElementById('time').textContent = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }, 20000);

    // Pozdrav
    window.onload = () => {
      setTimeout(() => {
        speak("Zdravo! Ja sam Ami, tvoja AI sekretarica. Kako mogu da ti pomognem večeras?");
      }, 800);
    };

    // Neumorphic klikovi
    function selectCategory(n) {
      const titles = ["Ideas", "To-Do", "Meeting Notes", "Random Drafts"];
      document.getElementById('title').textContent = titles[n];
      document.getElementById('content').textContent = "Ovde će se pojaviti tvoj sadržaj.";
      speak("Otvorila sam " + titles[n]);
    }

    function showAlarm(n) {
      speak(n === 0 ? "Morning Workout u 8 sati." : "Client Call u 14:30.");
    }

    // Mikrofon upload
    document.getElementById('uploadMic').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const img = document.createElement('img');
          img.src = ev.target.result;
          const container = document.getElementById('micContainer');
          container.innerHTML = '';
          container.appendChild(img);
        };
        reader.readAsDataURL(file);
      }
    });

    // Glasovno
    let recognition;
    const status = document.getElementById('status');

    document.getElementById('micContainer').addEventListener('click', () => {
      if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'sr-RS';
        recognition.start();
        status.textContent = "Slušam te...";
        
        recognition.onresult = (e) => {
          const text = e.results[0][0].transcript;
          status.textContent = "Ti: " + text;
          setTimeout(() => respond(text), 700);
        };
      } else {
        status.textContent = "Govori... (demo mod)";
      }
    });

    function respond(text) {
      const t = text.toLowerCase();
      if (t.includes("zdravo") || t.includes("kako si")) speak("Super sam! Šta želiš danas?");
      else if (t.includes("danas")) speak("Danas imaš nekoliko obaveza. Želiš li da ti ih kažem?");
      else speak("Razumela sam. Zabeležila sam.");
    }

    function speak(txt) {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'sr-RS';
        speechSynthesis.speak(u);
        status.textContent = "Ami: " + txt;
      }
    }
  </script>
</body>
</html>
