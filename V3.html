<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ami • AI Sekretarica</title>
  <meta name="theme-color" content="#f8f9fa">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #1c1c1e;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      padding: 12px 20px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
    }
    .tabs {
      display: flex;
      background: #f1f1f3;
      margin: 8px 16px;
      border-radius: 50px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 50px;
      font-weight: 500;
    }
    .tab.active {
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .container {
      display: flex;
      height: calc(100vh - 130px);
    }
    .sidebar {
      width: 300px;
      background: white;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      padding: 10px;
    }
    .item {
      padding: 14px 16px;
      margin: 6px 8px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      background: #f8f9fa;
    }
    .item:hover, .item.active {
      background: #f0f0f2;
    }
    .badge {
      margin-left: auto;
      background: #ff3b5c;
      color: white;
      font-size: 0.8rem;
      padding: 2px 8px;
      border-radius: 50%;
    }
    .main-area {
      flex: 1;
      padding: 20px;
      position: relative;
      overflow-y: auto;
    }
    .mic-button {
      position: absolute;
      bottom: 30px;
      right: 30px;
      width: 110px;
      height: 110px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,122,255,0.3),
                  inset 0 0 20px rgba(0,200,255,0.2);
      border: 8px solid #e0f0ff;
      cursor: pointer;
    }
    .mic-button:active {
      transform: scale(0.92);
    }
  </style>
</head>
<body>
  <div class="header">
    <div>Ami</div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="background:#34c759; width:10px; height:10px; border-radius:50%;"></div>
      <strong>Ami</strong>
    </div>
    <div>10:45</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Quick Notes</div>
    <div class="tab" onclick="switchTab(1)">Alarmi</div>
  </div>

  <div class="container">
    <!-- Leva strana - Kategorije -->
    <div class="sidebar">
      <div class="item active" onclick="showContent(0)"><span style="font-size:1.4rem; margin-right:12px;">📝</span> Ideas <span class="badge">3</span></div>
      <div class="item" onclick="showContent(1)"><span style="font-size:1.4rem; margin-right:12px;">✅</span> To-Do <span class="badge">5</span></div>
      <div class="item" onclick="showContent(2)"><span style="font-size:1.4rem; margin-right:12px;">📋</span> Meeting Notes <span class="badge">8</span></div>
      <div class="item" onclick="showContent(3)"><span style="font-size:1.4rem; margin-right:12px;">📄</span> Random Drafts <span class="badge">@2</span></div>
    </div>

    <!-- Desna strana - Sadržaj -->
    <div class="main-area" id="mainContent">
      <h2 id="contentTitle">Ideas</h2>
      <p id="contentText">Ovde će se pojavljivati sadržaj kada pritisneš neku kategoriju sa leve strane.</p>
      
      <!-- Primer alarma (kao na slici) -->
      <div style="margin-top:30px;">
        <div style="display:flex; align-items:center; margin:15px 0;">
          <span style="font-size:1.5rem; margin-right:12px;">⏰</span>
          <div>
            <div>Morning Workout</div>
            <div style="font-size:0.9rem; color:#666;">8:00 AM</div>
          </div>
          <label style="margin-left:auto;"><input type="checkbox" checked></label>
        </div>
      </div>
    </div>
  </div>

  <!-- Veliki mikrofon -->
  <div class="mic-button" id="micBtn">
    <span style="font-size:58px;">🎤</span>
  </div>

  <script>
    // Switch tab
    function switchTab(n) {
      alert(n === 0 ? "Quick Notes mod" : "Alarmi mod (u razvoju)");
    }

    // Klik na levu stranu
    function showContent(n) {
      const titles = ["Ideas", "To-Do", "Meeting Notes", "Random Drafts"];
      const texts = [
        "Ovde možeš da zapisuješ ideje...",
        "Lista tvojih obaveza za danas...",
        "Beleške sa sastanaka...",
        "Sve ostalo što ti padne na pamet..."
      ];
      
      document.getElementById('contentTitle').textContent = titles[n];
      document.getElementById('contentText').textContent = texts[n];
    }

    // Mikrofon
    const micBtn = document.getElementById('micBtn');
    micBtn.addEventListener('click', () => {
      if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'sr-RS';
        recognition.start();
        
        recognition.onresult = (e) => {
          const text = e.results[0][0].transcript;
          alert("Čula sam: " + text);
        };
      } else {
        alert("Slušam te... (demo)");
      }
    });

    // Pozdrav
    window.onload = () => {
      setTimeout(() => {
        alert("Zdravo! Ja sam Ami 👋\nPritisni kategorije levo ili veliki mikrofon.");
      }, 800);
    };
  </script>
</body>
</html>
