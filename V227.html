<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUNA SMART PRO • AI SEKRETARICA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root{

--mic-size:230px;

--theme-main-color:#3b82f6;

--phone-bg:#eceef3;
--header-bg:#ffffff;
--panel-out-bg:#f5f5f7;
--panel-inset-bg:#e6e8ed;
--item-bg:#ffffff;
--header-text:#111827;

--3d-light-reflection:rgba(255,255,255,.95);
--3d-shadow-color:rgba(0,0,0,.15);
}

.dark-mode-active{

--phone-bg:#0b1220;
--header-bg:#182233;
--panel-out-bg:#1d293d;
--panel-inset-bg:#0d1625;
--item-bg:#1f2a3d;
--header-text:#f8fafc;

--3d-light-reflection:rgba(255,255,255,.08);
--3d-shadow-color:rgba(0,0,0,.55);
}

*{
box-sizing:border-box;
}

body{

margin:0;
padding:0;

display:flex;
justify-content:center;

background:#060b13;

font-family:'Inter',sans-serif;
overflow:hidden;
}

.phone-frame{

width:100%;
max-width:430px;
height:100vh;

background:var(--phone-bg);

overflow:hidden;

display:flex;
flex-direction:column;

position:relative;

transition:.3s;
}

.panel-3d-out{

background:var(--panel-out-bg);

border-radius:28px;

border-top:5px solid rgba(255,255,255,.8);
border-left:5px solid rgba(255,255,255,.8);

box-shadow:
8px 14px 22px rgba(0,0,0,.12),
-4px -4px 10px rgba(255,255,255,.7);
}

.panel-3d-inset{

background:var(--panel-inset-bg);

border-radius:28px;

box-shadow:
inset 8px 8px 14px rgba(0,0,0,.12),
inset -6px -6px 12px rgba(255,255,255,.8);
}

.icon-round{

width:64px;
height:64px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:white;

box-shadow:
0 10px 20px rgba(0,0,0,.12),
-2px -2px 8px rgba(255,255,255,.9);
}

.avatar{

width:60px;
height:60px;

border-radius:50%;

overflow:hidden;

display:flex;
align-items:center;
justify-content:center;

background:#dbe2ea;

border:3px solid white;

cursor:pointer;
}

.mic-container{

width:var(--mic-size);
height:var(--mic-size);

border-radius:50%;

overflow:hidden;

display:flex;
align-items:center;
justify-content:center;

position:relative;

background:#ececf1;

box-shadow:
0 20px 40px rgba(0,0,0,.18),
inset -4px -4px 10px rgba(255,255,255,.8);

cursor:pointer;
}

.mic-ring{

position:absolute;

width:94%;
height:94%;

border-radius:50%;

background:
conic-gradient(
#00d0ff,
#9747ff,
#ff00ff,
#00d0ff);

animation:ringRotate 4s linear infinite;

z-index:1;
}

.mic-inner{

width:88%;
height:88%;

border-radius:50%;

background:#ececf1;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

position:relative;

z-index:2;

box-shadow:
inset 4px 4px 10px rgba(0,0,0,.12),
inset -4px -4px 10px rgba(255,255,255,.9);
}

.mic-photo{

width:100%;
height:100%;

object-fit:cover;
object-position:center center;

border-radius:50%;

transform:scale(1.1);
}

.listening .mic-container{

animation:pulse 1.2s infinite;
}

.mode-active{

background:linear-gradient(135deg,#2563eb,#60a5fa)!important;
color:white!important;

box-shadow:
inset 3px 3px 8px rgba(0,0,0,.4),
0 8px 18px rgba(37,99,235,.45);
}

.red-badge{

position:absolute;
top:-2px;
right:-2px;

width:28px;
height:28px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#ef4444,#b91c1c);

color:white;

font-weight:900;

font-size:12px;

border:2px solid white;
}

.delete-btn{

width:24px;
height:24px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:red;

color:white;

font-size:10px;

cursor:pointer;

flex-shrink:0;
}

@keyframes pulse{

50%{

transform:scale(1.03);

box-shadow:
0 0 30px #00d0ff,
0 0 50px #9747ff;
}
}

@keyframes ringRotate{

100%{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<input type="file"
id="mic-upload"
accept="image/*"
hidden
onchange="changeMicImage(this)">

<div class="phone-frame"
id="phone-body">

<!-- HEADER -->

<div class="px-4 py-3 flex items-center justify-between border-b"
style="background:var(--header-bg)">

<div class="flex items-center gap-3">

<div class="avatar">

<i class="fa-solid fa-robot text-slate-400 text-2xl"></i>

</div>

<div>

<div class="font-black text-3xl"
style="color:var(--header-text)">

Luna

</div>

<div class="text-slate-400 font-bold">

Smart AI Režim

</div>

</div>
</div>

<div class="flex items-center gap-4">

<div onclick="toggleTheme()"
class="w-14 h-14 rounded-full flex items-center justify-center cursor-pointer panel-3d-out"
id="theme-btn">

<i class="fa-solid fa-moon text-slate-500 text-xl"></i>

</div>

<div onclick="openSettings()"
class="px-8 py-4 rounded-full bg-sky-600 text-white font-black text-2xl shadow-xl cursor-pointer">

Saša

</div>

</div>
</div>

<!-- HOME -->

<div id="home-screen"
class="flex-1 flex flex-col justify-between p-4 overflow-hidden">

<div class="flex gap-4 h-[290px]">

<div class="w-[50%] flex flex-col gap-4">

<div onclick="selectSection('notes')"
class="panel-3d-inset p-4 flex-1 cursor-pointer">

<div class="relative h-full flex items-center gap-4">

<div class="icon-round">

<i class="fa-solid fa-note-sticky text-blue-500 text-3xl"></i>

</div>

<div class="font-black text-2xl">
Beleške
</div>

<div id="notes-count"
class="red-badge">

0

</div>

</div>
</div>

<div onclick="selectSection('alarms')"
class="panel-3d-inset p-4 flex-1 cursor-pointer">

<div class="relative h-full flex items-center gap-4">

<div class="icon-round">

<i class="fa-solid fa-bell text-yellow-500 text-3xl"></i>

</div>

<div class="font-black text-2xl">
Alarmi
</div>

<div id="alarms-count"
class="red-badge">

0

</div>

</div>
</div>
</div>

<div class="flex-1 panel-3d-out p-5 overflow-y-auto">

<div id="preview-content"
class="font-bold text-xl leading-relaxed text-slate-800">

Dobrodošao u Luna Smart Pro aplikaciju.

</div>

</div>
</div>

<!-- MODES -->

<div class="grid grid-cols-4 gap-3 mt-4">

<button onclick="setMode(this)"
class="panel-3d-inset py-6 rounded-[28px] font-black text-xl mode-active">

🧠<br>
Pametna

</button>

<button onclick="setMode(this)"
class="panel-3d-inset py-6 rounded-[28px] font-black text-xl">

🤪<br>
Šaljiva

</button>

<button onclick="setMode(this)"
class="panel-3d-inset py-6 rounded-[28px] font-black text-xl">

🔮<br>
Sveznal

</button>

<button onclick="setMode(this)"
class="panel-3d-inset py-6 rounded-[28px] font-black text-xl">

💼<br>
Profi

</button>

</div>

<!-- MIC -->

<div class="flex flex-col items-center mt-auto mb-8">

<div id="mic-trigger"
onclick="toggleListening()"
class="mic-container">

<div class="mic-ring"></div>

<div id="mic-inner"
class="mic-inner">

<i class="fa-solid fa-microphone text-slate-400 text-[110px]"></i>

</div>
</div>

<div id="mic-status"
class="mt-6 text-slate-400 font-black tracking-[4px] text-xl">

DODIRNI I KAŽI KOMANDU

</div>

<button onclick="document.getElementById('mic-upload').click()"
class="mt-6 px-10 py-5 rounded-full bg-blue-600 text-white font-black text-2xl shadow-xl">

📸 Postavi sliku mikrofona

</button>

</div>

</div>

<!-- SETTINGS -->

<div id="settings-screen"
class="hidden flex-1 p-5 overflow-y-auto">

<div class="flex justify-between items-center mb-6">

<div class="font-black text-3xl">
⚙️ Podešavanja
</div>

<div onclick="closeSettings()"
class="text-4xl cursor-pointer">

←

</div>

</div>

<div class="panel-3d-out p-5">

<div class="font-black mb-3 text-xl">

🔑 Groq API ključ

</div>

<input type="password"
id="groq-key"
placeholder="gsk_..."
class="w-full p-4 rounded-2xl border text-xl">

<button onclick="saveGroqKey()"
class="mt-4 w-full py-4 rounded-2xl bg-blue-600 text-white font-black text-xl">

Sačuvaj ključ

</button>

</div>

</div>

</div>

<script>

let activeSection='notes';

let appData=
JSON.parse(localStorage.getItem('luna_app_data'))
||
{
notes:[],
alarms:[]
};

let groqKey=
localStorage.getItem('groq_key')
||
'';

let recognition;
let isListening=false;

function saveMemory(){

localStorage.setItem(
'luna_app_data',
JSON.stringify(appData)
);
}

function openSettings(){

document
.getElementById('home-screen')
.classList.add('hidden');

document
.getElementById('settings-screen')
.classList.remove('hidden');
}

function closeSettings(){

document
.getElementById('settings-screen')
.classList.add('hidden');

document
.getElementById('home-screen')
.classList.remove('hidden');
}

function saveGroqKey(){

const key=
document
.getElementById('groq-key')
.value
.trim();

if(key){

groqKey=key;

localStorage.setItem(
'groq_key',
key
);

alert('✅ API ključ sačuvan');
}
}

function toggleTheme(){

document
.getElementById('phone-body')
.classList.toggle('dark-mode-active');
}

function setMode(btn){

document
.querySelectorAll('.grid button')
.forEach(b=>b.classList.remove('mode-active'));

btn.classList.add('mode-active');
}

function selectSection(section){

activeSection=section;

updateDisplay();
}

function updateDisplay(){

document
.getElementById('notes-count')
.innerText=appData.notes.length;

document
.getElementById('alarms-count')
.innerText=appData.alarms.length;

const box=
document.getElementById('preview-content');

if(activeSection==='notes'){

let html='';

appData.notes.forEach((n,i)=>{

html+=`

<div class="panel-3d-out p-4 mb-3 flex justify-between gap-3">

<div>${n}</div>

<div onclick="deleteNote(${i})"
class="delete-btn">

✕
</div>

</div>
`;
});

box.innerHTML=
html || 'Nema beleški.';
}
else{

let html='';

appData.alarms.forEach((n,i)=>{

html+=`

<div class="panel-3d-out p-4 mb-3 flex justify-between gap-3">

<div>${n}</div>

<div onclick="deleteAlarm(${i})"
class="delete-btn">

✕
</div>

</div>
`;
});

box.innerHTML=
html || 'Nema alarma.';
}
}

function deleteNote(i){

appData.notes.splice(i,1);

saveMemory();

updateDisplay();
}

function deleteAlarm(i){

appData.alarms.splice(i,1);

saveMemory();

updateDisplay();
}

function speak(text){

if('speechSynthesis' in window){

speechSynthesis.cancel();

const u=
new SpeechSynthesisUtterance(text);

u.lang='sr-RS';

speechSynthesis.speak(u);
}
}

function changeMicImage(input){

if(!input.files[0]) return;

const reader=
new FileReader();

reader.onload=e=>{

document
.getElementById('mic-inner')
.innerHTML=`

<img src="${e.target.result}"
class="mic-photo">

`;

localStorage.setItem(
'mic_img',
e.target.result
);
};

reader.readAsDataURL(input.files[0]);
}

async function askAI(text){

if(!groqKey){

speak('Unesite Groq API ključ.');

return;
}

try{

const response=
await fetch(
'https://api.groq.com/openai/v1/chat/completions',
{
method:'POST',

headers:{
'Authorization':`Bearer ${groqKey}`,
'Content-Type':'application/json'
},

body:JSON.stringify({

model:'llama-3.3-70b-versatile',

messages:[
{
role:'system',
content:'Ti si Luna pametna AI sekretarica na srpskom jeziku.'
},
{
role:'user',
content:text
}
]
})
});

const data=
await response.json();

const answer=
data.choices[0].message.content;

document
.getElementById('mic-status')
.innerText=answer;

speak(answer);

if(activeSection==='notes'){

appData.notes.push(answer);

}else{

appData.alarms.push(answer);
}

saveMemory();

updateDisplay();

}catch(e){

speak('Greška servera.');
}
}

function toggleListening(){

const SpeechRecognition=
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!recognition && SpeechRecognition){

recognition=
new SpeechRecognition();

recognition.lang='sr-RS';

recognition.onstart=()=>{

isListening=true;

document
.getElementById('home-screen')
.classList.add('listening');

document
.getElementById('mic-status')
.innerText='SLUŠAM...';
};

recognition.onresult=e=>{

const text=
e.results[0][0].transcript;

document
.getElementById('mic-status')
.innerText=text;

askAI(text);
};

recognition.onend=()=>{

isListening=false;

document
.getElementById('home-screen')
.classList.remove('listening');

document
.getElementById('mic-status')
.innerText=
'DODIRNI I KAŽI KOMANDU';
};
}

if(isListening){

recognition.stop();

}else{

recognition.start();
}
}

window.onload=()=>{

updateDisplay();

const saved=
localStorage.getItem('mic_img');

if(saved){

document
.getElementById('mic-inner')
.innerHTML=`

<img src="${saved}"
class="mic-photo">

`;
}

if(groqKey){

document
.getElementById('groq-key')
.value=groqKey;
}
};

</script>

</body>
</html>
