<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUNA SMART PRO • 3D AI Sekretarica</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --mic-size: 150px;
      --plastic-thickness: 5px;
      --inset-depth: 5px;
      --shadow-outer-strength: 0.15;
      --shadow-inner-strength: 0.12;
      
      --icon-opacity: 1.0;
      --icon-saturation: 120%;
      --text-contrast: #1e293b;

      /* Svetli Mod (Default) */
      --phone-bg: #f1f5f9;
      --header-bg: #ffffff;
      --header-text: #1e293b;
      --panel-out-bg: #ffffff;
      --panel-inset-bg: #f8fafc;
      --item-bg: #ffffff;
      --3d-light-reflection: rgba(255, 255, 255, 0.95);
      --3d-shadow-color: rgba(0, 0, 0, var(--shadow-outer-strength));
      --inset-shadow-color: rgba(0, 0, 0, var(--shadow-inner-strength));
    }

    /* Tamni Mod (Dark Mode) */
    .dark-mode-active {
      --phone-bg: #0b0f19;
      --header-bg: #1e293b;
      --header-text: #f8fafc;
      --panel-out-bg: #1e293b;
      --panel-inset-bg: #070a12;
      --item-bg: #1e293b;
      --text-contrast: #f1f5f9;
      --3d-light-reflection: rgba(255, 255, 255, 0.12);
      --3d-shadow-color: rgba(0, 0, 0, 0.6);
      --inset-shadow-color: rgba(0, 0, 0, 0.55);
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background: #060b13; 
      margin: 0; 
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: var(--phone-bg);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: background-color 0.3s ease;
    }

    /* Duboka 3D urezana ležišta */
    .panel-3d-inset {
      background: var(--panel-inset-bg);
      border-radius: 24px;
      border-bottom: var(--inset-depth) solid var(--3d-light-reflection);
      border-right: var(--inset-depth) solid var(--3d-light-reflection);
      border-top: var(--inset-depth) solid rgba(0,0,0,0.18);
      border-left: var(--inset-depth) solid rgba(0,0,0,0.12);
      box-shadow: inset var(--inset-depth) var(--inset-depth) 10px var(--inset-shadow-color), 
                  inset -2px -2px 6px var(--3d-light-reflection);
      position: relative;
    }

    /* Ispupčeni 3D paneli */
    .panel-3d-out {
      background: var(--panel-out-bg);
      border-radius: 24px;
      border-top: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-left: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-bottom: 3px solid rgba(0,0,0,0.15);
      border-right: 3px solid rgba(0,0,0,0.12);
      box-shadow: 4px 8px 16px var(--3d-shadow-color), -2px -2px 6px var(--3d-light-reflection);
    }

    .item-3d-plastic {
      background: var(--item-bg);
      border-radius: 14px;
      border-top: 2px solid var(--3d-light-reflection);
      border-left: 2px solid var(--3d-light-reflection);
      box-shadow: 0 4px 8px var(--3d-shadow-color);
    }

    .icon-3d-round {
      width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      background: var(--item-bg);
      border-radius: 50%; 
      box-shadow: 0 6px 12px var(--3d-shadow-color), -1px -1px 3px var(--3d-light-reflection);
      overflow: hidden;
      flex-shrink: 0;
      filter: saturate(var(--icon-saturation));
      opacity: var(--icon-opacity);
    }

    .avatar-container {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #e2e8f0;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.4);
      animation: floatSlow 3.5s ease-in-out infinite;
      cursor: pointer;
      overflow: hidden;
      border: 2px solid #ffffff;
      z-index: 50;
    }

    .sasa-plastic-badge {
      background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%);
      color: white; 
      font-weight: 800;
      padding: 6px 16px; 
      border-radius: 20px;
      border-top: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 16px rgba(2, 132, 199, 0.35);
      animation: floatSlow 3.5s ease-in-out infinite;
      animation-delay: 0.3s;
      cursor: pointer;
    }

    @keyframes floatSlow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .theme-toggle-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; cursor: pointer;
      background: var(--panel-out-bg);
      border-top: 2px solid var(--3d-light-reflection);
      box-shadow: 2px 4px 8px var(--3d-shadow-color), -2px -2px 4px var(--3d-light-reflection);
    }

    .red-badge {
      position: absolute; top: -2px; right: -2px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: white; width: 18px; height: 18px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; border: 1.5px solid white;
    }

    /* SAVRŠENO GEOMETRIJSKI CENTRIRAN MIKROFON UNUTAR KRUGA */
    .mic-container {
      width: var(--mic-size); 
      height: var(--mic-size);
      background: var(--item-bg);
      border-radius: 50%;
      border-top: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-left: var(--plastic-thickness) solid var(--3d-light-reflection);
      box-shadow: 0 12px 24px var(--3d-shadow-color), -4px -4px 12px var(--3d-light-reflection);
      cursor: pointer;
      display: flex; 
      align-items: center; 
      justify-content: center;
      position: relative; 
      overflow: hidden;
      z-index: 40;
    }

    #mic-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .listening .mic-container { animation: pulse 1.2s infinite; }
    @keyframes pulse { 50% { transform: scale(1.03); box-shadow: 0 0 25px #2563eb; } }

    .mode-btn-active {
      background: linear-gradient(135deg, #1d4ed8, #1e40af) !important;
      color: white !important;
      border-top: 3px solid rgba(0,0,0,0.2) !important;
      border-left: 3px solid rgba(0,0,0,0.15) !important;
      box-shadow: inset 2px 3px 6px rgba(0,0,0,0.4) !important;
    }

    .btn-delete-round {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff3b3b 0%, #d31e1e 100%);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900;
      border: 1.5px solid #ffffff;
      box-shadow: 0 3px 6px rgba(211, 30, 30, 0.4);
      cursor: pointer;
      flex-shrink: 0;
    }

    .custom-text-clr { color: var(--text-contrast) !important; }
    .custom-icon-clr { filter: saturate(var(--icon-saturation)); opacity: var(--icon-opacity); }
  </style>
</head>
<body>

  <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="changeAvatar(this)">
  <input type="file" id="note-upload" accept="image/*" class="hidden" onchange="changeIcon('note', this)">
  <input type="file" id="bell-upload" accept="image/*" class="hidden" onchange="changeIcon('bell', this)">
  <input type="file" id="mic-upload" accept="image/*" class="hidden" onchange="changeMicImage(this)">

  <div class="phone-frame" id="phone-body">
    
    <div class="px-4 py-3 flex items-center justify-between border-b z-50" style="background-color: var(--header-bg); border-color: var(--3d-light-reflection);">
      <div class="flex items-center gap-3">
        <div onclick="triggerFile('avatar-upload')" id="avatar-holder" class="avatar-container flex items-center justify-center">
          <i class="fa-solid fa-robot text-slate-400 text-2xl"></i>
        </div>
        <div>
          <div class="font-black text-base tracking-tight" style="color: var(--header-text);" id="lbl-luna">Luna</div>
          <div class="text-[11px] text-slate-400 font-bold" id="lbl-status-mod">Smart AI Režim</div>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <div onclick="toggleThemeMode()" class="theme-toggle-btn" id="theme-btn-icon">
          <i class="fa-solid fa-moon text-slate-500 text-xs"></i>
        </div>
        <div onclick="otvoriZasebnaPodesavanja()" class="sasa-plastic-badge text-xs" id="badge-sasa">Saša</div>
      </div>
    </div>

    <div id="home-screen" class="flex-1 flex flex-col justify-between p-4 overflow-hidden relative z-20">
      
      <div class="flex gap-3 h-[210px] shrink-0">
        <div class="w-[50%] flex flex-col gap-3">
          
          <div onclick="selectSection('notes')" class="panel-3d-inset p-2.5 cursor-pointer flex-1 flex items-center">
            <div class="flex items-center gap-3 w-full relative">
              <div id="note-icon" class="icon-3d-round">
                <i class="fa-solid fa-note-sticky text-blue-500 text-lg custom-icon-clr"></i>
              </div>
              <div class="font-extrabold text-sm custom-text-clr tracking-tight">Beleške</div>
              <div id="badge-notes" class="red-badge">0</div>
            </div>
          </div>

          <div onclick="selectSection('alarms')" class="panel-3d-inset p-2.5 cursor-pointer flex-1 flex items-center">
            <div class="flex items-center gap-3 w-full relative">
              <div id="bell-icon" class="icon-3d-round">
                <i class="fa-solid fa-bell text-yellow-500 text-lg custom-icon-clr"></i>
              </div>
              <div class="font-extrabold text-sm custom-text-clr tracking-tight">Alarmi</div>
              <div id="badge-alarms" class="red-badge">0</div>
            </div>
          </div>
          
        </div>

        <div class="flex-1 panel-3d-out p-3 overflow-y-auto">
          <div id="preview-content" class="text-[12px] font-bold custom-text-clr leading-relaxed"></div>
        </div>
      </div>

      <div class="grid grid-cols-4 gap-1.5 mt-2 shrink-0">
        <div class="panel-3d-inset p-0.5">
          <button id="mod-smart" onclick="setAiMode('smart')" class="w-full py-3 text-[10px] font-black rounded-xl bg-transparent custom-text-clr transition flex flex-col items-center gap-0.5"><span>🧠</span>Pametna</button>
        </div>
        <div class="panel-3d-inset p-0.5">
          <button id="mod-funny" onclick="setAiMode('funny')" class="w-full py-3 text-[10px] font-black rounded-xl bg-transparent custom-text-clr transition flex flex-col items-center gap-0.5"><span>🤪</span>Šaljiva</button>
        </div>
        <div class="panel-3d-inset p-0.5">
          <button id="mod-expert" onclick="setAiMode('expert')" class="w-full py-3 text-[10px] font-black rounded-xl bg-transparent custom-text-clr transition flex flex-col items-center gap-0.5"><span>🔮</span>Sveznal</button>
        </div>
        <div class="panel-3d-inset p-0.5">
          <button id="mod-pro" onclick="setAiMode('pro')" class="w-full py-3 text-[10px] font-black rounded-xl bg-transparent custom-text-clr transition flex flex-col items-center gap-0.5"><span>💼</span>Profi</button>
        </div>
      </div>

      <div class="flex flex-col items-center justify-center mt-auto mb-6 relative z-40">
        <div id="mic-trigger" onclick="toggleListening()" class="mic-container">
          <div id="mic-inner">
            <i id="mic-icon-graphic" class="fa-solid fa-microphone text-blue-500 text-3xl custom-icon-clr"></i>
          </div>
        </div>
        <span id="mic-status-text" class="mt-3 text-[10px] font-black tracking-widest text-slate-400 text-center uppercase">DODIRNI I KAŽI KOMANDU</span>
      </div>
    </div>

    <div id="settings-screen" class="hidden flex-1 p-4 overflow-y-auto relative z-20" style="background-color: var(--phone-bg);">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-base font-black custom-text-clr">⚙️ Kontrolna Tabla</h2>
        <i onclick="zatvoriZasebnaPodesavanja()" class="fa-solid fa-arrow-left text-xl cursor-pointer text-slate-400 p-1"></i>
      </div>
      
      <div class="space-y-4 text-xs">
        
        <div class="panel-3d-out p-4 space-y-3">
          <p class="font-black text-blue-500 uppercase text-[10px] border-b pb-1">📐 1. Plastičnost i Geometrija</p>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-1">Veličina mikrofona: <span id="lbl-mic">150px</span></label>
            <input type="range" min="120" max="180" value="150" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('mic', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-1">Debljina plastike: <span id="lbl-thick">5px</span></label>
            <input type="range" min="1" max="8" value="5" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('thick', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-1">Dubina ureza: <span id="lbl-inset">5px</span></label>
            <input type="range" min="1" max="8" value="5" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('inset', this.value)">
          </div>
        </div>

        <div class="panel-3d-out p-4 space-y-3">
          <p class="font-black text-emerald-500 uppercase text-[10px] border-b pb-1">🎨 2. Intenzitet i Izgled Boja</p>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-1">Spoljašnje senke: <span id="lbl-sh-out">15%</span></label>
            <input type="range" min="5" max="40" value="15" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('sh-out', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-1">Vidljivost ikona: <span id="lbl-c-ico">100%</span></label>
            <input type="range" min="30" max="100" value="100" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('c-ico', this.value)">
          </div>
          <div>
            <label class="flex justify-between font-bold custom-text-clr mb-1">Zasićenost ikona: <span id="lbl-sat-ico">120%</span></label>
            <input type="range" min="50" max="200" value="120" class="w-full h-1 bg-slate-300 rounded" oninput="updateStyle('sat-ico', this.value)">
          </div>
        </div>

        <div class="panel-3d-out p-4">
          <p class="font-bold custom-text-clr mb-1">🔑 Groq AI API Ključ</p>
          <input type="password" id="groq-key" placeholder="gsk_..." class="w-full p-2.5 border rounded-xl bg-transparent custom-text-clr text-xs">
          <button onclick="saveGroqKey()" class="mt-2 w-full bg-blue-600 text-white py-2 rounded-xl font-bold">Sačuvaj Ključ</button>
        </div>

        <div class="panel-3d-out p-4 space-y-2">
          <p class="font-bold custom-text-clr">📸 Izmena grafika aplikacije:</p>
          <button onclick="triggerFile('avatar-upload')" class="w-full py-2 bg-blue-50 text-blue-700 rounded-xl font-bold text-left px-3">🤖 Postavi Avatar</button>
          <button onclick="triggerFile('note-upload')" class="w-full py-2 bg-indigo-50 text-indigo-700 rounded-xl font-bold text-left px-3">📝 Sličica Beleški</button>
          <button onclick="triggerFile('bell-upload')" class="w-full py-2 bg-amber-50 text-amber-700 rounded-xl font-bold text-left px-3">🔔 Sličica Alarma</button>
          <button onclick="triggerFile('mic-upload')" class="w-full py-2 bg-emerald-50 text-emerald-700 rounded-xl font-bold text-left px-3">🎙️ Grafika Mikrofona</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let groqKey = localStorage.getItem('groq_key') || '';
    let currentAiMode = localStorage.getItem('luna_ai_mode') || 'smart';
    let themeMode = localStorage.getItem('luna_theme_mode') || 'light';
    let appData = JSON.parse(localStorage.getItem('luna_app_data')) || { notes: ["U beleške telefon broj 1.89 568 432113423"], alarms: [] };
    let activeSection = 'notes';
    let isListening = false;
    let recognition;

    function sacuvajUMemoriju() { localStorage.setItem('luna_app_data', JSON.stringify(appData)); }
    
    function otvoriZasebnaPodesavanja() {
      document.getElementById('home-screen').classList.add('hidden');
      document.getElementById('settings-screen').classList.remove('hidden');
    }

    function zatvoriZasebnaPodesavanja() {
      document.getElementById('settings-screen').classList.add('hidden');
      document.getElementById('home-screen').classList.remove('hidden');
    }

    function saveGroqKey() {
      const keyInput = document.getElementById('groq-key').value.trim();
      if (keyInput) { groqKey = keyInput; localStorage.setItem('groq_key', groqKey); alert("✅ Ključ sačuvan!"); }
    }

    function toggleThemeMode() {
      themeMode = (themeMode === 'light') ? 'dark' : 'light';
      localStorage.setItem('luna_theme_mode', themeMode);
      primeniTemu();
    }

    function primeniTemu() {
      const ram = document.getElementById('phone-body');
      const btnIcon = document.getElementById('theme-btn-icon');
      if (themeMode === 'dark') { 
        ram.classList.add('dark-mode-active'); 
        btnIcon.innerHTML = `<i class="fa-solid fa-sun text-yellow-400 text-xs"></i>`;
      } else { 
        ram.classList.remove('dark-mode-active'); 
        btnIcon.innerHTML = `<i class="fa-solid fa-moon text-slate-500 text-xs"></i>`;
      }
    }

    function setAiMode(mod) {
      currentAiMode = mod; localStorage.setItem('luna_ai_mode', mod);
      document.querySelectorAll('[id^="mod-"]').forEach(btn => btn.classList.remove('mode-btn-active'));
      document.getElementById(`mod-${mod}`).classList.add('mode-btn-active');
      const nazivi = { smart: "Pametna AI", funny: "Šaljiva AI", expert: "Sveznalica AI", pro: "Profi AI" };
      document.getElementById('lbl-status-mod').innerText = nazivi[mod] + " Režim";
    }

    function triggerFile(id) { document.getElementById(id).click(); }
    
    function changeAvatar(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => { 
        document.getElementById('avatar-holder').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
        localStorage.setItem('saved_avatar', e.target.result);
      };
      reader.readAsDataURL(input.files[0]);
    }

    function changeIcon(type, input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => {
        const html = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
        if (type === 'note') { document.getElementById('note-icon').innerHTML = html; localStorage.setItem('saved_icon_note', e.target.result); }
        else if (type === 'bell') { document.getElementById('bell-icon').innerHTML = html; localStorage.setItem('saved_icon_bell', e.target.result); }
      };
      reader.readAsDataURL(input.files[0]);
    }

    function changeMicImage(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = e => { 
        document.getElementById('mic-inner').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-full">`; 
        localStorage.setItem('saved_mic_img', e.target.result);
      };
      reader.readAsDataURL(input.files[0]);
    }

    function updateStyle(prop, val) {
      const root = document.documentElement;
      if (prop === 'mic') { root.style.setProperty('--mic-size', val + 'px'); document.getElementById('lbl-mic').innerText = val + 'px'; localStorage.setItem('reg_mic', val); }
      else if (prop === 'thick') { root.style.setProperty('--plastic-thickness', val + 'px'); document.getElementById('lbl-thick').innerText = val + 'px'; localStorage.setItem('reg_thick', val); }
      else if (prop === 'inset') { root.style.setProperty('--inset-depth', val + 'px'); document.getElementById('lbl-inset').innerText = val + 'px'; localStorage.setItem('reg_inset', val); }
      else if (prop === 'sh-out') { root.style.setProperty('--shadow-outer-strength', (val/100)); document.getElementById('lbl-sh-out').innerText = val + '%'; localStorage.setItem('reg_sh_out', val); }
      else if (prop === 'c-ico') { root.style.setProperty('--icon-opacity', (val/100)); document.getElementById('lbl-c-ico').innerText = val + '%'; localStorage.setItem('reg_c_ico', val); }
      else if (prop === 'sat-ico') { root.style.setProperty('--icon-saturation', val + '%'); document.getElementById('lbl-sat-ico').innerText = val + '%'; localStorage.setItem('reg_sat-ico', val); }
    }

    function obrisiBelesku(index) { appData.notes.splice(index, 1); sacuvajUMemoriju(); updateDisplay(); }
    function obrisiAlarm(index) { appData.alarms.splice(index, 1); sacuvajUMemoriju(); updateDisplay(); }

    function updateDisplay() {
      document.getElementById('badge-notes').innerText = appData.notes.length;
      document.getElementById('badge-alarms').innerText = appData.alarms.length;
      const content = document.getElementById('preview-content');
      
      if (activeSection === 'notes') {
        let html = `<h3 class="font-black text-sm text-blue-500 mb-2 uppercase tracking-wide">📝 SVE BELEŠKE</h3><ul class="space-y-2">`;
        if (appData.notes.length === 0) html += `<p class="text-slate-400 text-center py-4">Nema stavki</p>`;
        appData.notes.forEach((n, idx) => {
          html += `
            <li class="item-3d-plastic p-3 flex justify-between items-start gap-2">
              <span class="font-bold custom-text-clr text-xs break-words flex-1">${n}</span>
              <div onclick="obrisiBelesku(${idx})" class="btn-delete-round mt-0.5"><i class="fa-solid fa-xmark"></i></div>
            </li>`;
        });
        content.innerHTML = html + `</ul>`;
      } else {
        let html = `<h3 class="font-black text-sm text-yellow-500 mb-2 uppercase tracking-wide">⏰ ALARMI & PODSETNICI</h3><ul class="space-y-2">`;
        if (appData.alarms.length === 0) html += `<p class="text-slate-400 text-center py-4">Nema alarma</p>`;
        appData.alarms.forEach((a, idx) => {
          html += `
            <li class="item-3d-plastic p-3 flex justify-between items-start gap-2 border-l-4 border-l-amber-500">
              <span class="font-black text-xs text-amber-600 flex-1">${a}</span>
              <div onclick="obrisiAlarm(${idx})" class="btn-delete-round mt-0.5"><i class="fa-solid fa-xmark"></i></div>
            </li>`;
        });
        content.innerHTML = html + `</ul>`;
      }
    }

    function selectSection(section) { activeSection = section; updateDisplay(); }

    // FUNKCIJA GOVORA I ODGOVARANJA PREKO GROQ AI SERVERA
    async function posaljiLuniNaServer(korisnikTekst) {
      const contentPanel = document.getElementById('preview-content');
      if (!groqKey) {
        contentPanel.innerHTML = `<p class="text-red-500 font-bold">Greška: API ključ nije postavljen! Klikni na dugme 'Saša' i upiši ključ.</p>`;
        izgovoriTekst("Molim vas, upišite vaš ključ u podešavanjima.");
        return;
      }

      contentPanel.innerHTML = `<div class="flex items-center gap-2 py-4 text-slate-400 font-bold animate-pulse"><span>⏳</span> Luna razmišlja...</div>`;
      
      let sistemInstrukcija = "Ti si Luna, pametna 3D AI sekretarica. Odgovaraj kratko, jasno i direktno na srpskom jeziku.";
      if (currentAiMode === 'funny') sistemInstrukcija = "Ti si Luna, šaljiva i duhovita AI sekretarica. Odgovaraj kroz šalu, koristi emojije i budi zabavna na srpskom jeziku.";
      if (currentAiMode === 'expert') sistemInstrukcija = "Ti si Luna, sveznalica i ekspert. Daj tačne, logičke i stručne informacije na srpskom jeziku.";
      if (currentAiMode === 'pro') sistemInstrukcija = "Ti si Luna, visoko profesionalni asistent. Odgovaraj ultra-poslovno, ozbiljno i precizno na srpskom jeziku.";

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${groqKey}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              { role: "system", content: sistemInstrukcija },
              { role: "user", content: korisnikTekst }
            ],
            temperature: 0.7
          })
        });

        const data = await response.json();
        if (data.choices && data.choices[0]) {
          let odgovor = data.choices[0].message.content;
          
          // Čuvanje odgovora direktno u izabranu sekciju (Beleške ili Alarmi)
          if (activeSection === 'notes') { appData.notes.push(odgovor); } 
          else { appData.alarms.push(odgovor); }
          sacuvajUMemoriju();
          updateDisplay();

          // Luna izgovara odgovor naglas!
          izgovoriTekst(odgovor);
        } else {
          contentPanel.innerHTML = `<p class="text-red-500">Greška u odgovoru sa servera.</p>`;
        }
      } catch (err) {
        contentPanel.innerHTML = `<p class="text-red-500">Sreverska greška: Proverite internet vezu ili API ključ.</p>`;
      }
    }

    function izgovoriTekst(tekst) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleanText = tekst.replace(/[\*#_]/g, ''); // Sklanja markdown oznake za lepši govor
        const u = new SpeechSynthesisUtterance(cleanText);
        u.lang = 'sr-RS'; 
        u.rate = 1.0;
        window.speechSynthesis.speak(u);
      }
    }

    function toggleListening() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!recognition && SpeechRecognition) {
        recognition = new SpeechRecognition(); recognition.lang = 'sr-RS';
        recognition.onstart = () => { isListening = true; document.getElementById('home-screen').classList.add('listening'); document.getElementById('mic-status-text').innerText = "SLUŠAM VAS ŠAŠA..."; };
        recognition.onresult = (e) => { 
          let tekst = e.results[0][0].transcript;
          posaljiLuniNaServer(tekst);
        };
        recognition.onend = () => { isListening = false; document.getElementById('home-screen').classList.remove('listening'); document.getElementById('mic-status-text').innerText = "DODIRNI I KAŽI KOMANDU"; };
      }
      if (isListening) recognition.stop(); else recognition.start();
    }

    window.onload = () => {
      zatvoriZasebnaPodesavanja();
      if (groqKey) document.getElementById('groq-key').value = groqKey;
      setAiMode(currentAiMode);
      primeniTemu();

      // Učitavanje vrednosti reglera
      let r_mic = localStorage.getItem('reg_mic') || '150'; updateStyle('mic', r_mic);
      let r_th = localStorage.getItem('reg_thick') || '5'; updateStyle('thick', r_th);
      let r_in = localStorage.getItem('reg_inset') || '5'; updateStyle('inset', r_in);
      let r_so = localStorage.getItem('reg_sh_out') || '15'; updateStyle('sh-out', r_so);
      let r_ci = localStorage.getItem('reg_c_ico') || '100'; updateStyle('c-ico', r_ci);
      let r_si = localStorage.getItem('reg_sat-ico') || '120'; updateStyle('sat-ico', r_si);

      // Slike iz memorije
      let av = localStorage.getItem('saved_avatar'); if(av) document.getElementById('avatar-holder').innerHTML = `<img src="${av}" class="w-full h-full object-cover">`;
      let n_ico = localStorage.getItem('saved_icon_note'); if(n_ico) document.getElementById('note-icon').innerHTML = `<img src="${n_ico}" class="w-full h-full object-cover">`;
      let b_ico = localStorage.getItem('saved_icon_bell'); if(b_ico) document.getElementById('bell-icon').innerHTML = `<img src="${b_ico}" class="w-full h-full object-cover">`;
      let m_img = localStorage.getItem('saved_mic_img'); if(m_img) document.getElementById('mic-inner').innerHTML = `<img src="${m_img}" class="w-full h-full object-cover rounded-full">`;

      updateDisplay();
    };
  </script>
</body>
</html>
