<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUNA SMART PRO • 3D AI Sekretarica</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --mic-size: 150px;
      --plastic-thickness: 5px;
      --inset-depth: 5px;
      --shadow-outer-strength: 0.15;
      --shadow-inner-strength: 0.12;

      --icon-opacity: 1;
      --icon-saturation: 120%;

      --text-contrast: #1e293b;
      --sasa-badge-color: #0284c7;
      --theme-main-color: #3b82f6;

      --phone-bg: #f1f5f9;
      --header-bg: #ffffff;
      --header-text: #1e293b;
      --panel-out-bg: #ffffff;
      --panel-inset-bg: #f8fafc;
      --item-bg: #ffffff;
      --3d-light-reflection: rgba(255,255,255,0.95);
      --3d-shadow-color: rgba(0,0,0,var(--shadow-outer-strength));
      --inset-shadow-color: rgba(0,0,0,var(--shadow-inner-strength));
    }

    .dark-mode-active {
      --phone-bg: #0b0f19;
      --header-bg: #1e293b;
      --header-text: #f8fafc;
      --panel-out-bg: #1e293b;
      --panel-inset-bg: #070a12;
      --item-bg: #1e293b;
      --3d-light-reflection: rgba(255,255,255,0.12);
      --3d-shadow-color: rgba(0,0,0,0.6);
      --inset-shadow-color: rgba(0,0,0,0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050b14;
      margin: 0;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .phone-frame {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: var(--phone-bg);
      overflow: hidden;
      position: relative;
      transition: .3s;
      display: flex;
      flex-direction: column;
    }

    .panel-3d-inset {
      background: var(--panel-inset-bg);
      border-radius: 24px;
      border-bottom: var(--inset-depth) solid var(--3d-light-reflection);
      border-right: var(--inset-depth) solid var(--3d-light-reflection);
      border-top: var(--inset-depth) solid rgba(0,0,0,0.18);
      border-left: var(--inset-depth) solid rgba(0,0,0,0.12);
      box-shadow:
        inset var(--inset-depth) var(--inset-depth) 10px var(--inset-shadow-color),
        inset -2px -2px 6px var(--3d-light-reflection);
    }

    .panel-3d-out {
      background: var(--panel-out-bg);
      border-radius: 24px;
      border-top: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-left: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-bottom: 3px solid rgba(0,0,0,0.15);
      border-right: 3px solid rgba(0,0,0,0.12);
      box-shadow:
        4px 8px 16px var(--3d-shadow-color),
        -2px -2px 6px var(--3d-light-reflection);
    }

    .item-3d-plastic {
      background: var(--item-bg);
      border-radius: 14px;
      border-top: 2px solid var(--3d-light-reflection);
      border-left: 2px solid var(--3d-light-reflection);
      box-shadow: 0 4px 8px var(--3d-shadow-color);
    }

    .icon-3d-round {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--item-bg);
      border-radius: 50%;
      box-shadow:
        0 6px 12px var(--3d-shadow-color),
        -1px -1px 3px var(--3d-light-reflection);
      overflow: hidden;
      flex-shrink: 0;
      filter: saturate(var(--icon-saturation));
      opacity: var(--icon-opacity);
    }

    .avatar-container {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      background: #dbe5f0;
      border: 2px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: floatSlow 3.5s ease-in-out infinite;
      box-shadow:
        0 8px 16px rgba(0,0,0,0.15),
        inset 0 2px 4px rgba(255,255,255,0.5);
    }

    .sasa-plastic-badge {
      background: var(--sasa-badge-color);
      color: white;
      font-weight: 800;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      animation: floatSlow 3.5s ease-in-out infinite;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }

    .theme-toggle-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--panel-out-bg);
      border-top: 2px solid var(--3d-light-reflection);
      box-shadow:
        2px 4px 8px var(--3d-shadow-color),
        -2px -2px 4px var(--3d-light-reflection);
    }

    .mic-container {
      width: var(--mic-size);
      height: var(--mic-size);
      border-radius: 50%;
      background: var(--item-bg);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-top: var(--plastic-thickness) solid var(--3d-light-reflection);
      border-left: var(--plastic-thickness) solid var(--3d-light-reflection);
      box-shadow:
        0 12px 24px var(--3d-shadow-color),
        -4px -4px 12px var(--3d-light-reflection);
    }

    #mic-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      border-radius: 50%;
      display: block;
      transform: scale(1.08);
    }

    .listening .mic-container {
      animation: pulse 1.2s infinite;
    }

    .mode-btn-active {
      background: var(--theme-main-color) !important;
      color: white !important;
      border-top: 3px solid rgba(0,0,0,0.2) !important;
      border-left: 3px solid rgba(0,0,0,0.15) !important;
      box-shadow: inset 2px 3px 6px rgba(0,0,0,0.4) !important;
    }

    .btn-delete-round {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: red;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid white;
    }

    .red-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: linear-gradient(135deg,#ef4444,#b91c1c);
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
    }

    .custom-text-clr {
      color: var(--text-contrast) !important;
    }

    .custom-icon-clr {
      filter: saturate(var(--icon-saturation));
      opacity: var(--icon-opacity);
    }

    @keyframes pulse {
      50% {
        transform: scale(1.03);
        box-shadow: 0 0 25px var(--theme-main-color);
      }
    }

    @keyframes floatSlow {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
  </style>
</head>
<body>

<input type="file" id="mic-upload" accept="image/*" hidden onchange="changeMicImage(this)">

<div class="phone-frame" id="phone-body">

  <div class="px-4 py-3 flex items-center justify-between border-b" style="background: var(--header-bg)">

    <div class="flex items-center gap-3">
      <div class="avatar-container">
        <i class="fa-solid fa-robot text-slate-400 text-2xl"></i>
      </div>

      <div>
        <div class="font-black text-base tracking-tight" style="color: var(--header-text)">
          Luna
        </div>
        <div class="text-[11px] text-slate-400 font-bold">
          Smart AI Režim
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div onclick="toggleThemeMode()" class="theme-toggle-btn" id="theme-btn-icon">
        <i class="fa-solid fa-moon text-slate-500 text-xs"></i>
      </div>

      <div class="sasa-plastic-badge text-xs">
        Saša
      </div>
    </div>
  </div>

  <div id="home-screen" class="flex-1 flex flex-col justify-between p-4 overflow-hidden relative">

    <div class="flex gap-3 h-[210px] shrink-0">

      <div class="w-[50%] flex flex-col gap-3">

        <div class="panel-3d-inset p-2.5 cursor-pointer flex-1 flex items-center">
          <div class="flex items-center gap-3 w-full relative">

            <div class="icon-3d-round">
              <i class="fa-solid fa-note-sticky text-blue-500 text-lg custom-icon-clr"></i>
            </div>

            <div class="font-extrabold text-sm custom-text-clr tracking-tight">
              Beleške
            </div>

            <div class="red-badge">
              1
            </div>
          </div>
        </div>

        <div class="panel-3d-inset p-2.5 cursor-pointer flex-1 flex items-center">
          <div class="flex items-center gap-3 w-full relative">

            <div class="icon-3d-round">
              <i class="fa-solid fa-bell text-yellow-500 text-lg custom-icon-clr"></i>
            </div>

            <div class="font-extrabold text-sm custom-text-clr tracking-tight">
              Alarmi
            </div>

            <div class="red-badge">
              0
            </div>
          </div>
        </div>
      </div>

      <div class="flex-1 panel-3d-out p-3 overflow-y-auto">
        <div class="text-[12px] font-bold custom-text-clr leading-relaxed">
          Dobrodošao u Luna Smart Pro aplikaciju.
        </div>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-1.5 mt-2 shrink-0">

      <div class="panel-3d-inset p-0.5">
        <button class="mode-btn-active w-full py-3 text-[10px] font-black rounded-xl flex flex-col items-center gap-0.5">
          <span>🧠</span>
          Pametna
        </button>
      </div>

      <div class="panel-3d-inset p-0.5">
        <button class="w-full py-3 text-[10px] font-black rounded-xl custom-text-clr flex flex-col items-center gap-0.5">
          <span>🤪</span>
          Šaljiva
        </button>
      </div>

      <div class="panel-3d-inset p-0.5">
        <button class="w-full py-3 text-[10px] font-black rounded-xl custom-text-clr flex flex-col items-center gap-0.5">
          <span>🔮</span>
          Sveznal
        </button>
      </div>

      <div class="panel-3d-inset p-0.5">
        <button class="w-full py-3 text-[10px] font-black rounded-xl custom-text-clr flex flex-col items-center gap-0.5">
          <span>💼</span>
          Profi
        </button>
      </div>
    </div>

    <div class="flex flex-col items-center justify-center mt-auto mb-6 relative z-40">

      <div id="mic-trigger" onclick="toggleListening()" class="mic-container">

        <div id="mic-inner">
          <i class="fa-solid fa-microphone text-blue-500 text-3xl custom-icon-clr"></i>
        </div>
      </div>

      <span id="mic-status-text" class="mt-3 text-[10px] font-black tracking-widest text-slate-400 text-center uppercase">
        DODIRNI I KAŽI KOMANDU
      </span>

      <button onclick="document.getElementById('mic-upload').click()"
        class="mt-4 px-4 py-2 rounded-2xl bg-blue-600 text-white font-bold text-xs shadow-lg">
        📸 Postavi sliku mikrofona
      </button>
    </div>
  </div>
</div>

<script>

  let themeMode = localStorage.getItem('luna_theme_mode') || 'light';
  let isListening = false;
  let recognition;

  function toggleThemeMode() {

    themeMode = themeMode === 'light' ? 'dark' : 'light';

    localStorage.setItem('luna_theme_mode', themeMode);

    primeniTemu();
  }

  function primeniTemu() {

    const ram = document.getElementById('phone-body');
    const btn = document.getElementById('theme-btn-icon');

    if (themeMode === 'dark') {

      ram.classList.add('dark-mode-active');

      btn.innerHTML = `
        <i class="fa-solid fa-sun text-yellow-400 text-xs"></i>
      `;

    } else {

      ram.classList.remove('dark-mode-active');

      btn.innerHTML = `
        <i class="fa-solid fa-moon text-slate-500 text-xs"></i>
      `;
    }
  }

  function changeMicImage(input) {

    if (!input.files || !input.files[0]) return;

    const reader = new FileReader();

    reader.onload = e => {

      document.getElementById('mic-inner').innerHTML = `
        <img src="${e.target.result}" class="mic-photo">
      `;

      localStorage.setItem('saved_mic_img', e.target.result);
    };

    reader.readAsDataURL(input.files[0]);
  }

  function toggleListening() {

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!recognition && SpeechRecognition) {

      recognition = new SpeechRecognition();
      recognition.lang = 'sr-RS';

      recognition.onstart = () => {

        isListening = true;

        document.getElementById('home-screen').classList.add('listening');

        document.getElementById('mic-status-text').innerText = 'SLUŠAM VAS SAŠA...';
      };

      recognition.onresult = e => {

        let text = e.results[0][0].transcript;

        document.getElementById('mic-status-text').innerText = text;

        speakText(text);
      };

      recognition.onend = () => {

        isListening = false;

        document.getElementById('home-screen').classList.remove('listening');

        document.getElementById('mic-status-text').innerText = 'DODIRNI I KAŽI KOMANDU';
      };
    }

    if (isListening) {
      recognition.stop();
    } else {
      recognition.start();
    }
  }

  function speakText(text) {

    if ('speechSynthesis' in window) {

      speechSynthesis.cancel();

      const u = new SpeechSynthesisUtterance(text);

      u.lang = 'sr-RS';
      u.rate = 1;

      speechSynthesis.speak(u);
    }
  }

  window.onload = () => {

    primeniTemu();

    let m_img = localStorage.getItem('saved_mic_img');

    if (m_img) {

      document.getElementById('mic-inner').innerHTML = `
        <img src="${m_img}" class="mic-photo">
      `;
    }
  }

</script>

</body>
</html>
